. Shinto", "d. Jainism", "e. Buddhism"], "answer": "Buddhism"}, {"id": 25, "question": "Most sub-Saharan languages come from one giant linguistic family, called", "choices": ["a. Niger-Kongo", "b. Sudanese-Zulu", "c. Semitic", "d. Swahili", "e. Bantu"], "answer": "Bantu"}, {"id": 26, "question": "Scythians were fearsome horse archers, and they were noted to live in what form of dwelling?", "choices": ["a. tree houses", "b. log cabins", "c. portable felt huts", "d. subterranean caverns", "e. mud-brick fortresses"], "answer": "portable felt huts"}, {"id": 27, "question": "The trans-Saharan trade routes would not have been possible were it not for the domestication of", "choices": ["a. Horses", "b. Llamas", "c. Donkeys", "d. Cows", "e. Camels"], "answer": "Camels"}, {"id": 28, "question": "The most important African network of cultural exchange from 300 B.C.E to 1100 C.E. can be described as", "choices": ["a. the trade across the Sahara", "b. the link with Islamic Arabia", "c. mainly internal folk migrations within sub-Saharan Africa", "d. taking place only in North Africa", "e. the Indian Ocean network"], "answer": "mainly internal folk migrations within sub-Saharan Africa"}, {"id": 29, "question": "What military technologies did the Silk Road spread?", "choices": ["a. Chariots, Greek fire, and gunpowder", "b. The lance, chain mail, and gunpowder", "c. The war elephant, hardtack, and Arabian horses", "d. Chariot warfare, mounted bowmen, and the stirrup", "e. The field hospital, the broadsword, and the poison arrow"], "answer": "Chariot warfare, mounted bowmen, and the stirrup"}, {"id": 30, "question": "Buddhism, Christianity, and Islam all spread", "choices": ["a. only to their neighboring countries", "b. predominantly by warfare", "c. without dependency on a single ethnic or kinship group", "d. only within their own countries until the nineteenth century", "e. most often by the use of missionaries, generally sponsored by the government"], "answer": "without dependency on a single ethnic or kinship group"}, {"id": 31, "question": "Which of the following does not constitute a shared cultural heritage, or what anthropologists classify as \"great traditions\"?", "choices": ["a. Ethical codes", "b. Intellectual traditions", "c. Common legal and belief systems", "d. Political unity", "e. A written language"], "answer": "Political unity"}, {"id": 32, "question": "The savannah region of Africa was characterized by", "choices": ["a. tropical rain forests", "b. desert", "c. long grasses and scattered forests", "d. lush oases with water and palm trees", "e. semiarid steppes"], "answer": "long grasses and scattered forests"}, {"id": 33, "question": "What facilitated the spread of Christianity to Armenia?", "choices": ["a. The creation of new Christian myths that included Armenian folklore", "b. The excellent management of the Christian church", "c. The invention of an Armenian alphabet in the early fifth century", "d. The prejudices against Buddhist monks in the cities", "e. The high taxation of non-Christians in Armenia"], "answer": "The invention of an Armenian alphabet in the early fifth century"}], "quiz5": [{"id": 1, "question": "The scholar Nasir al-Din Tusi, who wrote on history, poetry, ethics and religion, was most notable for his contributions in", "choices": ["a. mathematical developments in algebra and trigonometry.", "b. poetry written in Persian.", "c. an encompassing world history.", "d. cartography.", "e. translation of philosophy."], "answer": "mathematical developments in algebra and trigonometry."}, {"id": 2, "question": "To maintain control of vast areas, the Mongols formed different khanates. The Golden Horde ruled over Russia and the Chagatai ruled over", "choices": ["a. Central Asian domains.", "b. Japan.", "c. India.", "d. Korea.", "e. Russia."], "answer": "Central Asian domains."}, {"id": 3, "question": "Traditions relating the deeds and words of prophet Muhammad which, next to the Qur'an, are the most importance source for Islamic law, are called", "choices": ["a. ulama", "b. none of these", "c. umma", "d. shari'a", "e. hadith"], "answer": "hadith"}, {"id": 4, "question": "The foundation of Islamic civilization is the Shari'a, or", "choices": ["a. community.", "b. literature.", "c. law.", "d. philosophy.", "e. taxes."], "answer": "law."}, {"id": 5, "question": "Despite the fact that conversions to Islam were at their peak, Abbasid power declined because", "choices": ["a. there were frequent religious wars between the Sunnis and Shi'ites.", "b. the empire had to resist nomadic pressures on the frontier.", "c. the empire had become too big to rule effectively.", "d. new religious practices developed that challenged the appeal of Islam.", "e. there were constant revolts of non-Muslims against forced conversion."], "answer": "the empire had become too big to rule effectively."}, {"id": 6, "question": "Prophet Muhammad's revelations from the angel are compiled in a book called", "choices": ["a. the Quran.", "b. the Third Testament.", "c. the Revelations.", "d. the Hadith.", "e. the Ka'ba."], "answer": "the Quran."}, {"id": 7, "question": "The unified community that accepted Islam and believed that Muhammad was the \"Messenger of God\" was called the", "choices": ["a. umma.", "b. shaitan.", "c. jihad.", "d. ka'ba.", "e. hijra."], "answer": "umma."}, {"id": 8, "question": "Which of the Mongol Khans attacked Russian territories and took control of towns along the Volga?", "choices": ["a. Batu", "b. Ögödei", "c. Genghis", "d. Güyük", "e. Khubilai"], "answer": "Batu"}, {"id": 9, "question": "After rejection by his family for the title of Great Khan, Khubilai formed", "choices": ["a. the Yuan Empire in China and Siberia.", "b. the Golden Horde.", "c. he was assassinated by political rivals.", "d. the Central Asian Khanate.", "e. Il-Khan Empire of Iran."], "answer": "the Yuan Empire in China and Siberia."}, {"id": 10, "question": "In 1368, the Yuan Empire was overthrown and replaced by the", "choices": ["a. Ming Empire.", "b. Song Empire.", "c. Tang Empire.", "d. Yi Kingdom.", "e. Manchu Empire."], "answer": "Ming Empire."}, {"id": 11, "question": "What did the Sasanid and Byzantine Empires have in common?", "choices": ["a. a shared distaste for Christianity.", "b. dependence on camels", "c. societal unrest because of religious heterogeneity.", "d. a military emphasis on cavalry", "e. central control of imperial finances."], "answer": "central control of imperial finances."}, {"id": 12, "question": "Why did the rulers of al-Andalus Spain finally take the title of caliph in 929?", "choices": ["a. They did so in response to the Fatimids assuming this title in Tunisia.", "b. The growing number of converts to Islam demanded it.", "c. They never did.", "d. They had finally solidified control of the region.", "e. Christians in northern Spain threatened invasion."], "answer": "They did so in response to the Fatimids assuming this title in Tunisia."}, {"id": 13, "question": "The rise of literacy in Korea resulted from the", "choices": ["a. spread of woodblock printing from China and the Mongol writing system.", "b. combination of an improved printing system and the han'gul writing system.", "c. popularity of Islam, which required that all Muslims read the Quran.", "d. imposition of Japanese rule, which forced the formation of public schools.", "e. institution of a university system."], "answer": "combination of an improved printing system and the han'gul writing system."}, {"id": 14, "question": "Despite political decay in al-Andalus, under Islamic leadership, the Jewish people of Spain", "choices": ["a. experienced a diaspora to eastern Europe.", "b. experienced widespread discrimination.", "c. were frequently arrested and persecuted.", "d. contributed to the cultural growth of Spain as great thinkers and writers, such as Maimonides.", "e. passed laws ensuring the ascension of Jews to the Spanish throne."], "answer": "contributed to the cultural growth of Spain as great thinkers and writers, such as Maimonides."}, {"id": 15, "question": "In 1295, the Il-khan ruler Ghazan converted to which religion?", "choices": ["a. Buddhism", "b. Christianity", "c. Islam", "d. Shinto", "e. Judaism"], "answer": "Islam"}, {"id": 16, "question": "Menial work in Mongol camps was done by", "choices": ["a. children.", "b. slaves", "c. women", "d. all of these.", "e. gendered division of labor"], "answer": "slaves"}, {"id": 17, "question": "The Mongol leader, the khan,", "choices": ["a. had no power to make decisions but retained a veto.", "b. had absolute power in decision making.", "c. deferred to the Mongol Parliament.", "d. was a figurehead only.", "e. had his decisions ratified by a council."], "answer": "had his decisions ratified by a council."}, {"id": 18, "question": "Which group held the lowest social rank in Yuan China?", "choices": ["a. Southern Chinese", "b. Northern Chinese", "c. Middle Easterners", "d. Mongols", "e. Central Asians"], "answer": "Southern Chinese"}, {"id": 19, "question": "The capital of the Umayyad caliphate was in", "choices": ["a. Antioch", "b. Baghdad", "c. Ephesus", "d. Mecca.", "e. Damascus"], "answer": "Damascus"}, {"id": 20, "question": "After prophet Muhammad's death, the Muslim community", "choices": ["a. chose a successor (caliph), Abu Bakr.", "b. searched the entire peninsula for a suitable successor, according to prophet Muhammad's last instructions.", "c. held general elections to replace prophet Muhammad.", "d. abandoned the orthodox teachings of Islam.", "e. embraced his wife, Khadija, as his successor."], "answer": "chose a successor (caliph), Abu Bakr."}, {"id": 21, "question": "What does Islam call on people to believe?", "choices": ["a. All of these.", "b. That the Qur'an is the revelation of Allah.", "c. That they must surrender to the will of God.", "d. That Islam is the one true religion.", "e. That Allah will reward or punish all people after death."], "answer": "All of these."}, {"id": 22, "question": "Muslim means", "choices": ["a. chosen for purity.", "b. the one true religion.", "c. first followers.", "d. holy people.", "e. one who submits to the will of God."], "answer": "one who submits to the will of God."}, {"id": 23, "question": "Why did Muhammad leave Mecca for Medina (known as the hijra, which marks the beginning of the Muslim calendar)?", "choices": ["a. Meccan leaders were threatened by his popularity.", "b. One of his visions commanded him to.", "c. Theology argued that Abraham had lived in the north.", "d. Muhammad's wife had family in Medina.", "e. He sought more followers in the north."], "answer": "Meccan leaders were threatened by his popularity."}, {"id": 24, "question": "The Sasanid Empire benefited from its location along the Silk Road. Some of the agricultural goods that it gained from China and East Asia were", "choices": ["a. sugar, wheat, and figs.", "b. eggplants, sugar, and rice.", "c. wheat, jute, and coffee beans.", "d. oats, quinoa, and manioc.", "e. mangoes, bananas, and spelt."], "answer": "eggplants, sugar, and rice."}, {"id": 25, "question": "The emperor Yongle improved the imperial complex built by the Mongols, called the", "choices": ["a. Heavenly Gates.", "b. Imperial House.", "c. Red Square.", "d. Forbidden City.", "e. Dragon's Court."], "answer": "Forbidden City."}, {"id": 26, "question": "In 1453, the Ottomans led by Sultan Mehmet II captured which important Christian city of the Byzantine Empire?", "choices": ["a. Vienna", "b. Paris", "c. Constantinople", "d. Kiev", "e. Budapest"], "answer": "Constantinople"}, {"id": 27, "question": "The Russian prince who advocated cooperation with the Mongols to avoid destructive assimilation was", "choices": ["a. Vladimir the Viking.", "b. Alexander Nevskii.", "c. Dmitri Donskoi.", "d. Grigorii Preobrazhenskii.", "e. Ivan III."], "answer": "Alexander Nevskii."}, {"id": 28, "question": "Who attempted to write the first world history?", "choices": ["a. The Abbasid caliph", "b. Marco Polo", "c. Ibn Battuta", "d. Ivan III", "e. Rashid al-Din"], "answer": "Rashid al-Din"}, {"id": 29, "question": "The decline of the Umayyad dynasty was due to", "choices": ["a. the arrival of a Jewish messiah.", "b. converts to Islam numbered no more than 10 percent.", "c. none of these.", "d. a peasant revolt over increases in taxes and decreases in wages.", "e. growing unrest among non-Arab Muslims, who demanded access to political power."], "answer": "growing unrest among non-Arab Muslims, who demanded access to political power."}, {"id": 30, "question": "As a result of the Il-Khan attempt to repel them in the Crimean/Caucases areas, the Golden Horde formed an alliance with:", "choices": ["a. Buddhists in India.", "b. Persian Muslims.", "c. Seljuk Turks.", "d. Egyptian Mamluks.", "e. Byzantine (Ottoman) Janissary forces."], "answer": "Egyptian Mamluks."}, {"id": 31, "question": "Ming China didn't develop seafaring for commercial and military because commercial maritime expectations fell short and:", "choices": ["a. The peasantry were a strong voting lobby and refused to support it.", "b. The merchants were opposed to losing their domestic markets.", "c. The emperor feared outside contacts and influence.", "d. The Japanese merchants undercut the market and stole China's trading partners.", "e. The Mongol threat from the north and west took priority over seafaring."], "answer": "The Mongol threat from the north and west took priority over seafaring."}, {"id": 32, "question": "The Arabs' involvement in Byzantine and Sasanid conflicts led to the penetration of these religions into the Arabian peninsula.", "choices": ["a. Judaism and Christianity", "b. Christianity and Buddhism", "c. Zoroastrianism and Christianity", "d. Zoroastrianism and Buddhism", "e. Judaism and Buddhism"], "answer": "Zoroastrianism and Christianity"}, {"id": 33, "question": "Which Russian ruler was the first to use the term \"tsar\" (Latin for caesar)?", "choices": ["a. Alexander Nevskii", "b. Catherine the Great", "c. Ivan IV", "d. Ivan III", "e. Peter the Great"], "answer": "Ivan III"}, {"id": 34, "question": "After the city of Mecca surrendered to prophet Muhammad, he established a new state based on a", "choices": ["a. government system similar to the Persian administration.", "b. dynastic system with his sons as the monarchs.", "c. loose coalition of Arab city-states.", "d. democratic government system.", "e. common religious faith."], "answer": "common religious faith."}, {"id": 35, "question": "A significant transmission and sharing of scientific knowledge originating in the Middle East and reaching Europe and India was found in the form of:", "choices": ["a. eclipse predictions and tables.", "b. networked astronomical observatories.", "c. a centralized library of shared knowledge at Tabriz.", "d. Uigher calendar calculations.", "e. formulas for alchemical processes."], "answer": "eclipse predictions and tables."}, {"id": 36, "question": "Why is the Abbasid rule considered a \"golden age\"?", "choices": ["a. It created a refined and cosmopolitan culture in Baghdad.", "b. It used the golden cow as the focus of religious worship.", "c. It used gold as the standard coinage throughout the empire.", "d. The Spanish region was considered the golden frontier.", "e. It is marked by the rule of the \"golden\" monarch, Abu Bakr."], "answer": "It created a refined and cosmopolitan culture in Baghdad."}, {"id": 37, "question": "The establishment of Zoroastrianism and Christianity as official faiths in the Sasanid and Byzantine empires (respectively) set the precedent for what future event?", "choices": ["a. The rejection of religion as an official political focus.", "b. The rise of corrupt leadership in those empires.", "c. The worldwide spread of Christianity.", "d. The rise of Islam as the focus of a political empire.", "e. The dominance of monotheism in all subsequent empires."], "answer": "The rise of Islam as the focus of a political empire."}, {"id": 38, "question": "Umayyad Spain developed a distinctive Islamic culture because of the", "choices": ["a. blending of Roman, Germanic, Jewish, Arab, and Berber traditions.", "b. blending of Islam with Roman traditions and Visigoth culture.", "c. Viking invasions of the ninth century.", "d. growing influence of Russian and Frankish traditions in Spain.", "e. decrease in Arab power combined with a growing Christian influence."], "answer": "blending of Roman, Germanic, Jewish, Arab, and Berber traditions."}, {"id": 39, "question": "One of the most significant effects of Mongol trade routes was the spread of diseases including", "choices": ["a. influenza.", "b. smallpox.", "c. all of these.", "d. typhus.", "e. bubonic plague."], "answer": "all of these."}, {"id": 40, "question": "One of the most prized commercial products of the Ming Empire was:", "choices": ["a. green or ginseng ink.", "b. wool.", "c. teakwood clocks.", "d. lightweight cannon.", "e. porcelain."], "answer": "porcelain."}, {"id": 41, "question": "Mongol rulers in China were increasingly influenced by the idea of a universal rulership model by religious leaders called lamas from", "choices": ["a. Japan.", "b. India.", "c. Tibet.", "d. Vietnam.", "e. Korea."], "answer": "Tibet."}, {"id": 42, "question": "Mu'awiya chose his own son, Yazid, to succeed him thereby establishing this caliphate.", "choices": ["a. Fatimid", "b. Mamluk", "c. Abbasid", "d. Umayyad", "e. none of these"], "answer": "Umayyad"}, {"id": 43, "question": "Religious conflicts in the Byzantine Empire resulted in treatment of Nestorian Christians as", "choices": ["a. outcasts from society who were unable to find jobs.", "b. heretics, seeking refuge under the Sasanid shah.", "c. holy, seeking the recovery of the holy lands through crusades.", "d. monks, seeking the true meaning of life in vows of poverty and chastity.", "e. converts to new faiths to avoid taxation."], "answer": "heretics, seeking refuge under the Sasanid shah."}, {"id": 44, "question": "Most subjects of both Byzantine and Sasanid rulers found common identity in", "choices": ["a. commerce.", "b. family kin groups.", "c. language.", "d. religion.", "e. occupations."], "answer": "religion."}, {"id": 45, "question": "Because Mongols controlled access to the Silk Road after the overthrow of the Yuan, the emperor Yongle put an emphasis on", "choices": ["a. maritime trade connecting with Southeast Asia and the Indian Ocean.", "b. trade through Buddhist monasteries.", "c. trans-Pacific exploration.", "d. none of these; trade decreased because people could not afford to travel by Silk Road and pay Mongol tariffs.", "e. overland trade through India and Arabia."], "answer": "maritime trade connecting with Southeast Asia and the Indian Ocean."}, {"id": 46, "question": "Which of the following statements is not true about the rule of the Seljuk Empire?", "choices": ["a. Seljuk leaders didn't get involved in internal religious fighting.", "b. Mesopotamia grew in population and influence.", "c. Cities shrank and lost population during their rule.", "d. Irrigation and canal systems fell into disrepair during their rule.", "e. They ruled the Middle East during the First Crusade."], "answer": "Mesopotamia grew in population and influence."}, {"id": 47, "question": "To demonstrate their rejection of the Mongols, the Ming emperors, starting with Hongwu,", "choices": ["a. marched all the Mongols to the Korean border.", "b. severed relations with the Middle East and Central Asia and closed the borders to foreigners.", "c. changed the official language from Mongolian to Chinese.", "d. formed close ties with the Manchu instead.", "e. built the Great Wall of China and deported all Mongols."], "answer": "severed relations with the Middle East and Central Asia and closed the borders to foreigners."}, {"id": 48, "question": "Benefits of Mongol rule in the Yuan Empire included all of the following EXCEPT", "choices": ["a. all of these", "b. transmission of knowledge and skills", "c. secure trade routes", "d. transition to tax farming instead of fixed rate method", "e. exchange of technical expertise between the East and West"], "answer": "transition to tax farming instead of fixed rate method"}, {"id": 49, "question": "Mongol armies often consisted of", "choices": ["a. Uighurs only.", "b. Chinese mercenaries.", "c. a multinational force with Mongol commanders.", "d. both male and female soldiers.", "e. ethnic Mongols only."], "answer": "a multinational force with Mongol commanders."}, {"id": 50, "question": "The Muslims fought the Battle of the Camel (656) in a dispute over the", "choices": ["a. compilation of the Quran.", "b. appointment of Abu Bakr.", "c. control of the royal treasury.", "d. Nestorian control of Yemenite lands.", "e. legitimacy of Ali as caliph."], "answer": "legitimacy of Ali as caliph."}, {"id": 51, "question": "The group of Muslims who believe the leader of Islam should be a descendant of prophet Muhammad's son-in-law is called the", "choices": ["a. Sunnis.", "b. Sufis.", "c. Hadj.", "d. Mobad.", "e. Shi'ites."], "answer": "Shi'ites."}, {"id": 52, "question": "The Mongol way of life, forced by a scarcity of resources, was largely", "choices": ["a. hunting and gathering.", "b. urbanized.", "c. pastoral.", "d. based on procurement.", "e. agricultural."], "answer": "pastoral."}, {"id": 53, "question": "Sufism was significant in being a", "choices": ["a. blending of Christian and Buddhist ideas into Islam.", "b. rejection of religious formalism.", "c. new doctrine that excluded the lower classes.", "d. quest for a direct union with God through rituals and training.", "e. attempt to convert more women to Islam."], "answer": "quest for a direct union with God through rituals and training."}, {"id": 54, "question": "What military techniques or innovations made the Choson military a formidable defensive force?", "choices": ["a. the development of poison gas canisters.", "b. compound bows and chain mail.", "c. phalanxes of soldiers deployed by rota.", "d. cannon with gunpowder-driven arrow launchers.", "e. battering rams and Trojan horses."], "answer": "cannon with gunpowder-driven arrow launchers."}, {"id": 55, "question": "The Abbasids purchased Turkic slaves, called mamluks, into military service. The mamluks eventually founded their own state in", "choices": ["a. Arabia.", "b. Egypt.", "c. Turkey.", "d. Iran.", "e. Spain."], "answer": "Egypt."}, {"id": 56, "question": "Why is the martyrdom of Husayn a significant event in Muslim history?", "choices": ["a. It marks the end of the Muslim expansion.", "b. It marks the beginning of Muslim expansion.", "c. It marks the beginning of the Islamic calendar.", "d. It marks the beginning of the sect of Shi'ism.", "e. It marks the anniversary of Jesus's crucifixion."], "answer": "It marks the beginning of the sect of Shi'ism."}, {"id": 57, "question": "Which of the following is an aspect of Mongol rule that created hardship and a sharp population decrease in China?", "choices": ["a. female infanticide", "b. Migration and flooding of the Yellow River", "c. Bubonic plague", "d. warfare", "e. all of these"], "answer": "all of these"}, {"id": 58, "question": "What economic problems did Russia see during the time of Mongol domination?", "choices": ["a. direct exchange of goods rather than purchases in currency.", "b. overzealous tax collection by Russian princes", "c. all of these.", "d. the burden of taxation carried by the peasantry.", "e. the attempt to introduce paper money by the Mongols."], "answer": "all of these."}, {"id": 59, "question": "How did the threat of Mongol invasion affect Japan?", "choices": ["a. Japanese clans took political control of their regions.", "b. Japanese monks were held hostage.", "c. Japanese merchants lost huge sums of money in the Mongolian markets.", "d. Japan reinstated direct imperial rule.", "e. The Japanese military government spent a lot of time building coastal defenses, and training and outfitting their warriors."], "answer": "The Japanese military government spent a lot of time building coastal defenses, and training and outfitting their warriors."}, {"id": 60, "question": "The ulama were religious scholars and", "choices": ["a. the primary interpreters of Islamic law.", "b. outcasts.", "c. rural leaders.", "d. government officials.", "e. a hired foreign military force."], "answer": "the primary interpreters of Islamic law."}, {"id": 61, "question": "Prophet Muhammad's teachings built upon the beliefs of", "choices": ["a. Judaism and Zoroastrianism.", "b. Judaism and Manichaeism.", "c. Judaism and Christianity.", "d. Judaism and Hinduism.", "e. Judaism and Buddhism."], "answer": "Judaism and Christianity."}, {"id": 62, "question": "One effect of the rise of cities in Yuan China was", "choices": ["a. the decline of the prestige of the warrior class.", "b. improved nutrition of the urban population.", "c. an interest in trade for the first time in China.", "d. the rise of a class of educated holy men.", "e. the increasing influence of Mandarin."], "answer": "the increasing influence of Mandarin."}, {"id": 63, "question": "The Byzantine Empire was centered in the area that is present-day Turkey, while the Sasanid Empire was centered in the area that is present-day", "choices": ["a. Iran.", "b. Egypt.", "c. Afghanistan.", "d. Lebanon.", "e. India."], "answer": "Iran."}, {"id": 64, "question": "Which of the following was NOT a contributing factor to Mongol military supremacy?", "choices": ["a. enormous conscripted armies to outnumber their enemies", "b. superior riding skills.", "c. catapults to hurl sometimes-flaming projectiles.", "d. flaming arrows", "e. more technically proficient bows."], "answer": "enormous conscripted armies to outnumber their enemies"}, {"id": 65, "question": "Which of the following statements about Muslim women is not true?", "choices": ["a. They were permitted to own property.", "b. They were permitted to practice birth control.", "c. They often played a role in public life.", "d. They adopted the Byzantine and Sasanid custom of veiling.", "e. They were permitted to divorce."], "answer": "They often played a role in public life."}, {"id": 66, "question": "Mecca was a late-blooming caravan city and", "choices": ["a. was the rival city to Jerusalem.", "b. was the birthplace of Abraham.", "c. was abundantly watered and needs no irrigation for crops.", "d. had an unusually cold climate for the Arabian peninsula.", "e. was a pilgrimage site of the Ka'ba."], "answer": "was a pilgrimage site of the Ka'ba."}, {"id": 67, "question": "Why was there a cultural flowering in Iran, Afghanistan, and Central Asia under the Timurids?", "choices": ["a. The Dutch tulip was a cultural catalyst between the two societies.", "b. Iran and China shared artistic trends and political ideas.", "c. The Timurids were schooled in art in Italy.", "d. The European style of the Renaissance reached Central Asia.", "e. Egyptian artisans migrated throughout Central Asia and the Middle East."], "answer": "Iran and China shared artistic trends and political ideas."}, {"id": 68, "question": "Manichaeism is a faith derived from Zoroastrianism and is founded on the idea that", "choices": ["a. Muhammad is the Prophet.", "b. there is a cosmic struggle between good and evil.", "c. people must attune themselves to nature.", "d. the universe is in cosmic balance.", "e. Jesus is the Savior."], "answer": "there is a cosmic struggle between good and evil."}, {"id": 69, "question": "The significant scientific discoveries of Islamic scholars were translated by", "choices": ["a. Byzantine monks into Greek.", "b. Christian scholars in Spain.", "c. Arabic scholars.", "d. all of these.", "e. Indian scholars in Delhi."], "answer": "all of these."}, {"id": 70, "question": "Mongol families often included believers in two or more religions, however, virtually all Mongols observed the practices of:", "choices": ["a. Atheism.", "b. Orthodox Christianity", "c. Buddhism.", "d. Islam.", "e. Shamanism."], "answer": "Shamanism."}, {"id": 71, "question": "Apparently envisioning himself as a new Genghis Khan, this ruler of the Chagatai Khanate attacked the Muslim sultanate of Delhi in 1398:", "choices": ["a. Jagadai", "b. Ghazan", "c. Juvaini", "d. H leg", "e. Timur"], "answer": "Timur"}, {"id": 72, "question": "Under this leader, the second caliph, began the expansion of the caliphate outside of Arabia.", "choices": ["a. Abu-Bakr", "b. Ali", "c. Umar", "d. Uthman", "e. Yazid"], "answer": "Umar"}, {"id": 73, "question": "The conflict between the Il-khans and the Golden Horde originated in", "choices": ["a. philosophical differences.", "b. political differences.", "c. economic differences.", "d. cultural differences.", "e. religious differences."], "answer": "religious differences."}, {"id": 74, "question": "Narratives such as Marco Polo's created a European", "choices": ["a. aversion to all things from Asia.", "b. isolationist mentality.", "c. image of Mongol poverty.", "d. ambition to find easier routes to Asia.", "e. fear of Mongol contact."], "answer": "ambition to find easier routes to Asia."}, {"id": 75, "question": "Political divisions continued after the fall of the Abbasid caliphate, and other groups took hold of the Middle East over several centuries, including Seljuk Turks, Crusaders, Mamluks, and eventually", "choices": ["a. Armenians", "b. Mongols", "c. Indians", "d. Byzantines", "e. Kurds"], "answer": "Mongols"}, {"id": 76, "question": "Which of the following did the Europeans not learn about from the Mongols, but rather from the Ming Chinese?", "choices": ["a. Movable type and bronze cannon", "b. Gunpowder and high-temperature metallurgy", "c. Porcelain", "d. Coal mining and higher mathematics", "e. Diplomatic passports"], "answer": "Porcelain"}, {"id": 77, "question": "In the Yuan Empire, the Mongols were the warriors, and the Central Asians and the Middle Easterners were the census takers and the", "choices": ["a. rulers.", "b. commanders.", "c. priests.", "d. farmers.", "e. tax collectors."], "answer": "tax collectors."}, {"id": 78, "question": "Byzantine power was significantly diminished by the Seljuks as a result of", "choices": ["a. the Battle of Manzikert", "b. the Seljuk's alliance with the Mamluks.", "c. the failure of the First Crusade.", "d. the Byzantine alliance with the Buyids.", "e. the Schism of 1054."], "answer": "the Battle of Manzikert"}, {"id": 79, "question": "Which of the following areas was not brought under Muslim control under the leadership of the caliphs?", "choices": ["a. Egypt and North Africa", "b. Eastern Europe", "c. Syria", "d. Spain", "e. The Indus Valley"], "answer": "Eastern Europe"}, {"id": 80, "question": "How did prophet Muhammad experience revelations?", "choices": ["a. Reading the Bible.", "b. Many years of religious study in a mosque.", "c. Being possessed by a shaitan.", "d. Dreaming about Ishmael from the Old Testament.", "e. From the Angel Gabriel."], "answer": "From the Angel Gabriel."}, {"id": 81, "question": "The first Mongol conquests under Genghis Khan were in", "choices": ["a. Egypt.", "b. Central Asia, the Middle East, and Russia.", "c. Northern China.", "d. Japan and Korea.", "e. Annam."], "answer": "Northern China."}, {"id": 82, "question": "Muslim religious practice is based on the", "choices": ["a. Eightfold Path.", "b. Ten Commandments.", "c. Three Goals to Salvation.", "d. Five Pillars.", "e. Four Noble Truths."], "answer": "Five Pillars."}], "quiz6": [{"id": 1, "question": "The three-field system was", "choices": ["a. the technology used in medieval optics.", "b. the legal system.", "c. the political relationship between king, lord, and serf.", "d. the traditional three-part contest performed by knights.", "e. an agricultural method."], "answer": "an agricultural method."}, {"id": 2, "question": "Latin Europe regained some of the \"lost knowledge\" of the Greek and Arab world when works by Plato and Aristotle came into the Latin West through:", "choices": ["a. contact with the court of Khubilai Khan.", "b. the recapture of southern Italy from the Byzantines and of Sicily and Toledo from the Muslims.", "c. the recapture of northern Germany from the Huns.", "d. the lively trade in classical antiquities.", "e. the discovery of the remains of the Library of Alexandria."], "answer": "the recapture of southern Italy from the Byzantines and of Sicily and Toledo from the Muslims."}, {"id": 3, "question": "Which of the following is not a distinctive feature of the Gothic cathedral?", "choices": ["a. Their great height", "b. The minarets", "c. The Gothic arch", "d. The flying buttress", "e. Giant stained-glass windows"], "answer": "The minarets"}, {"id": 4, "question": "Before they were expelled in 1492, the largest population of Jews in the West was found in", "choices": ["a. Spain.", "b. England.", "c. Belgium.", "d. Holland.", "e. France."], "answer": "Spain."}, {"id": 5, "question": "Which of the following is true of merchant banking in the fifteenth century?", "choices": ["a. Jews were prohibited from moneylending for religious reasons.", "b. Florence lagged behind the rest of the Latin West.", "c. Services were only offered to the clergy.", "d. Checking accounts, shareholding companies, moneychanging, loans, and investments were offered as services.", "e. No money could be lent for the purpose of warfare in accordance with the Banker Agreement of 1499."], "answer": "Checking accounts, shareholding companies, moneychanging, loans, and investments were offered as services."}, {"id": 6, "question": "Latin Europe innovated these ideas as degree-granting corporations imparting both religious and nonreligious knowledge.", "choices": ["a. museums", "b. universities", "c. guilds", "d. madrasas", "e. monasteries"], "answer": "universities"}, {"id": 7, "question": "The growth of metal working industries in the Middle Ages was due to", "choices": ["a. blast furnaces", "b. improved mining techniques from Central Europe", "c. all of these", "d. watermills", "e. new sources of metals"], "answer": "all of these"}, {"id": 8, "question": "Western Europeans of the later Middle Ages underscored their allegiance to the Roman Catholic Church and the Latin language and referred to themselves as", "choices": ["a. \"Old Worlders.\"", "b. Westerners.", "c. Latins.", "d. Europeans.", "e. Franks."], "answer": "Latins."}, {"id": 9, "question": "One of the significant features of the growth of literature in the 14-15th century was", "choices": ["a. the development of epic poetry.", "b. the incorporation of political criticism.", "c. the inclusion of common people in literary tales.", "d. the composition of literature in Latin.", "e. the composition of literature in the vernacular."], "answer": "the composition of literature in the vernacular."}, {"id": 10, "question": "What transformational change to later medieval military technology most directly impacted armored knights?", "choices": ["a. The organization of knights into armies and primitive biological warfare.", "b. The catapult.", "c. Universal male conscription and the invention of the mace.", "d. Crossbows with metal-tipped arrows.", "e. Military advancement based on merit."], "answer": "Crossbows with metal-tipped arrows."}, {"id": 11, "question": "The Hanseatic League was based in", "choices": ["a. England.", "b. Germany.", "c. Russia.", "d. the Ottoman Empire.", "e. Bulgaria."], "answer": "Germany."}, {"id": 12, "question": "The predominant city for trade with the Far East during the Middle Ages was:", "choices": ["a. Barcelona", "b. Paris", "c. Flanders", "d. Venice", "e. London"], "answer": "Venice"}, {"id": 13, "question": "Windmills and watermills", "choices": ["a. were banned by the pope as the \"devil's wheel.\"", "b. were invented in later medieval Europe.", "c. dated back to Roman times and had long been common in the Islamic world.", "d. were unknown in China.", "e. had little impact in Europe."], "answer": "dated back to Roman times and had long been common in the Islamic world."}, {"id": 14, "question": "Spain and Portugal's \"reconquest\" and political consolidation of the Iberian peninsula was designed to recapture land from", "choices": ["a. Slaves.", "b. Protestants.", "c. Muslims.", "d. Peasants.", "e. Africans."], "answer": "Muslims."}, {"id": 15, "question": "The Black Death, which had killed one out of three western Europeans, was primarily", "choices": ["a. dysentery.", "b. influenza.", "c. bubonic plague.", "d. malaria.", "e. anthrax."], "answer": "bubonic plague."}, {"id": 16, "question": "What percentage of the western European population was rural during the late Middle Ages?", "choices": ["a. 100%", "b. 75%", "c. 80%", "d. 70%", "e. 90%"], "answer": "90%"}, {"id": 17, "question": "Which factor was not a contributor to the doubling of the European population between 1100-1445?", "choices": ["a. unification under Christianity", "b. economic growth", "c. few epidemics", "d. warm temperatures", "e. new farming techniques"], "answer": "unification under Christianity"}, {"id": 18, "question": "The continued growth of trade and manufacturing after 1200 resulted in:", "choices": ["a. The isolation of Europe from the rest of the world.", "b. Strict government regulation.", "c. The continuing economic depression in agriculture.", "d. Religious revival and expansion.", "e. The growth of wealthy port cities and urban areas in the Latin West."], "answer": "The growth of wealthy port cities and urban areas in the Latin West."}, {"id": 19, "question": "Which of the following best describes the Hanseatic League?", "choices": ["a. The basic alignment for the Fourth Crusade.", "b. The beginning of the guild system.", "c. An economic and defensive alliance of free towns in northern Germany.", "d. A treaty involving Latin Europe's agricultural resources.", "e. A reliable transportation infrastructure."], "answer": "An economic and defensive alliance of free towns in northern Germany."}, {"id": 20, "question": "Which of the following was not a social result of the Black Death epidemic?", "choices": ["a. Peasant revolutions", "b. An end of serfdom for all intents and purposes", "c. A demand by laborers for higher pay", "d. A call for democracy", "e. An increase in per capita production"], "answer": "A call for democracy"}, {"id": 21, "question": "What \"architectural wonder\" first made its appearance in France on or about the year 1140 C.E.?", "choices": ["a. Guild halls", "b. Gothic cathedrals", "c. Chateaux", "d. Romanesque churches", "e. Opera houses"], "answer": "Gothic cathedrals"}, {"id": 22, "question": "The Renaissance began in", "choices": ["a. eastern France.", "b. Austria.", "c. southern England.", "d. southern Russia.", "e. northern Italy."], "answer": "northern Italy."}, {"id": 23, "question": "In Europe's later Middle Ages, the rapid growth of industry resulted in environmental changes; which of the following was not among them?", "choices": ["a. The extinction of many animal species", "b. The creation of quarry pits and mines", "c. Deforestation", "d. Water pollution by industries such as tanneries", "e. The damming of rivers"], "answer": "The extinction of many animal species"}, {"id": 24, "question": "The Bubonic Plague was brought originally from Central Asia by the Mongols and eventually to Europe by", "choices": ["a. Chinese explorers.", "b. Mongol invaders.", "c. Russian serfs.", "d. Genoese traders.", "e. Christian monks."], "answer": "Genoese traders."}, {"id": 25, "question": "The Great Western Schism originated over", "choices": ["a. whether or not women could be priests.", "b. rival papal claimants between Avignon and Rome.", "c. the formation of different types of monasteries (Franciscan, Dominican, Cappucin, etc).", "d. whether the seat of Catholicism should be in Rome or Constantinople.", "e. whether or not priests could be married."], "answer": "rival papal claimants between Avignon and Rome."}, {"id": 26, "question": "What caused the end of serfdom in western Europe?", "choices": ["a. the decimated agricultural productivity of the early 14th century", "b. emancipation after participating in the Hundred Years' War", "c. the Black Death", "d. the rise of cities", "e. the rise of popular literature"], "answer": "the Black Death"}, {"id": 27, "question": "Which of the following statements about the Magna Carta is not true?", "choices": ["a. It affirmed that monarchs are subject to established law.", "b. It confirmed the independence of the church and the city of London.", "c. It means \"Great Charter.\"", "d. It gave new rights to the peasants.", "e. It guaranteed the nobles hereditary rights."], "answer": "It gave new rights to the peasants."}, {"id": 28, "question": "One of the most significant growth industries in the 14th century was:", "choices": ["a. papermaking", "b. wool weaving", "c. metal smelting", "d. merchant banking", "e. stonemasonry"], "answer": "merchant banking"}, {"id": 29, "question": "Which of the following is true of \"new monarchies\" in Europe between 1450-1600?", "choices": ["a. it increased control over powerful noble families.", "b. it increased centralized power within largely fixed geographic limits.", "c. they relied on full-time armies paid for through taxes.", "d. all of these.", "e. The primary nations were England, France and Spain."], "answer": "all of these."}, {"id": 30, "question": "Which of the following fields of study were directly associated with the humanists?", "choices": ["a. all of these", "b. grammar", "c. rhetoric", "d. history", "e. language"], "answer": "all of these"}, {"id": 31, "question": "Joan of Arc", "choices": ["a. founded the city of Orleans.", "b. led the French to victory in a decisive battle during the Hundred Years War.", "c. brokered the English and French peace treaty, thus ending the Hundred Years War.", "d. became the queen of France during the Hundred Years War.", "e. was the only woman permitted to attend the University of Paris."], "answer": "led the French to victory in a decisive battle during the Hundred Years War."}, {"id": 32, "question": "Credit for \"the lost art of painting\" being revived is traditionally given to:", "choices": ["a. Botticelli", "b. Rembrandt", "c. Van Eyck", "d. Giotto", "e. Da Vinci"], "answer": "Giotto"}, {"id": 33, "question": "Guilds, which came to dominate medieval European life, was", "choices": ["a. a band of knights without ties to a lord.", "b. an order of monks.", "c. a unit of currency in use throughout the Latin West.", "d. a measurement of distance.", "e. an association of craft specialists from the same trade."], "answer": "an association of craft specialists from the same trade."}, {"id": 34, "question": "What official role did the Catholic Church play in the persecution of Jews in medieval Europe?", "choices": ["a. It did not often participate but usually looked the other way when persecution took place.", "b. It usually organized the persecution.", "c. It advocated a separate Jewish state in Europe.", "d. It assisted the authorities in helping to find out which Jews were responsible for any social disturbances.", "e. It played no official role, as only the papal city of Rome left its Jews undisturbed."], "answer": "It played no official role, as only the papal city of Rome left its Jews undisturbed."}, {"id": 35, "question": "The most notable work in Scholasticism, the Summa Theologica, was written by:", "choices": ["a. Thomas Aquinas", "b. Jan Hus", "c. Geoffrey Chaucer", "d. Peter Abelard", "e. Dante Aligheri"], "answer": "Thomas Aquinas"}, {"id": 36, "question": "The power of the Venetian traders was based on trade network connections with which of the following?", "choices": ["a. Constantinople", "b. Damascus", "c. all of these", "d. Genoa", "e. Cairo"], "answer": "all of these"}, {"id": 37, "question": "Which of the following fostered artistic growth in the Renaissance?", "choices": ["a. Universal education", "b. The war against the Muslims, in which many Muslim artists and artwork were captured", "c. The ability of the average person to afford art", "d. The patronage of wealthy merchants and prelates", "e. The \"artistic tax\" by which part of every salary was used to support museums"], "answer": "The patronage of wealthy merchants and prelates"}, {"id": 38, "question": "Which of the following does not describe the Divine Comedy?", "choices": ["a. It used the vernacular, foreshadowing the literary fashions of the later Italian Renaissance.", "b. It was written by Dante Alighieri.", "c. It features the Roman poet Virgil as the author's guide through Hell.", "d. It was written in Latin like most literature of the time.", "e. It made use of Greco-Roman classical themes."], "answer": "It was written in Latin like most literature of the time."}], "quiz7": [{"id": 1, "question": "In French Canada, Jesuit efforts to convert the native people to Christianity led to the", "choices": ["a. Stono Rebellion", "b. Battle of Montreal", "c. Amerindians being pushed to Puritanism", "d. Great Schism", "e. founding of schools, hospitals, and churches"], "answer": "founding of schools, hospitals, and churches"}, {"id": 2, "question": "Enormous wealth was generated by the Spanish through", "choices": ["a. establishing a monopoly on the Columbian exchange.", "b. silver and gold mines.", "c. engaging in slave trade of indigenous Americans.", "d. long-distance trade with Asia.", "e. development of plantation economies in the sugar trade."], "answer": "silver and gold mines."}, {"id": 3, "question": "The largest slave revolt in South Carolina took place in 1739 and was called", "choices": ["a. Gabriel's Rebellion.", "b. the Creole Rebellion.", "c. the Taiping Rebellion.", "d. Nat Turner's Rebellion.", "e. the Stono Rebellion."], "answer": "the Stono Rebellion."}, {"id": 4, "question": "Why did the Ming court suspend the voyages of Zheng He?", "choices": ["a. Zheng He's fleet was sunk by Portuguese naval might", "b. The unpredictable weather of the Indian Ocean made these voyages too unsafe", "c. The Chinese had suffered great epidemics from their contacts in the Indian Ocean", "d. Zheng He used the fleet to lead a revolution against the Ming emperor", "e. The government opposed increased contact with people considered as barbarians"], "answer": "The government opposed increased contact with people considered as barbarians"}, {"id": 5, "question": "Which of the following statements is not true of Chinese-African contacts circa 1415-1433?", "choices": ["a. Zheng's voyages were extended to Africa", "b. The Chinese imported more pepper as a result of this contact", "c. Zheng's voyages stimulated the Swahili silk market", "d. At least three trading cities in East Africa sent delegations to China in 1415", "e. Many cultural misunderstandings led to the Sino-African War"], "answer": "Many cultural misunderstandings led to the Sino-African War"}, {"id": 6, "question": "In Colonial Spanish America, the term used to describe someone of European descent born in the New World was", "choices": ["a. muchachos", "b. mulattos", "c. chinampas", "d. creoles", "e. mestizos"], "answer": "creoles"}, {"id": 7, "question": "Plantation economies grew all of the following labor intensive crops except", "choices": ["a. rice", "b. cotton", "c. sugar", "d. tobacco", "e. squash"], "answer": "squash"}, {"id": 8, "question": "How were the European languages and cultures primarily transmitted to indigenous populations?", "choices": ["a. enslavement and the use of the requiremento.", "b. creating bicultural societies through interaction and assimilation.", "c. conversion efforts by the Catholic church.", "d. there was strict separation of cultural and linguistic identities as a deliberate process of isolation.", "e. development of local schools and educational efforts by Spanish settlers."], "answer": "conversion efforts by the Catholic church."}, {"id": 9, "question": "Which of the following Old World foods did settlers introduce to New World agriculture?", "choices": ["a. Manioc, wheat, and amaranth", "b. Wheat, olives, grapes, and garden vegetables", "c. Spelt, taro, and chinampas", "d. Maize, rice, and bran", "e. Spelt, manioc, and wheat"], "answer": "Wheat, olives, grapes, and garden vegetables"}, {"id": 10, "question": "Which of the following is not one way that slaves expressed their resistance to the colonial masters in Latin America?", "choices": ["a. Running away", "b. Signing petitions", "c. Malingering", "d. Rebelling", "e. Sabotaging"], "answer": "Signing petitions"}, {"id": 11, "question": "How did the Vikings maneuver across long distances?", "choices": ["a. Trial and error", "b. Legends and oral traditions", "c. Use of the astrolabe and compas", "d. Knowledge of the heavens and seas", "e. Extensive Arabic maps"], "answer": "Knowledge of the heavens and seas"}, {"id": 12, "question": "Migrants to British colonies in the Americas who paid for passage by agreeing to work for a set term ranging from four to seven years were called:", "choices": ["a. Black slave labor.", "b. Indentured servants.", "c. The chinampa system.", "d. The mita and encomienda.", "e. Amerindian slave labor."], "answer": "Indentured servants."}, {"id": 13, "question": "Which of the following were ways that the Amerindian population reacted to the colonial economy?", "choices": ["a. They provided furs and deerskins to European traders.", "b. The natural balance of plants and animals was disrupted.", "c. All of these.", "d. Amerindian hunting and gathering and agricultural practices were disrupted.", "e. They became dependent on European goods."], "answer": "All of these."}, {"id": 14, "question": "Early sixteenth century Spanish adventurers who conquered Mexico, Central America and Peru were the", "choices": ["a. conquistadors", "b. teutonic knights", "c. marines", "d. saracens", "e. encomiendas"], "answer": "conquistadors"}, {"id": 15, "question": "The highest-ranking Spanish officials in the colonies were:", "choices": ["a. conquistadors", "b. creoles.", "c. viceroys", "d. priests.", "e. indigenous royalty"], "answer": "viceroys"}, {"id": 16, "question": "The most profitable and strongest colonization by Europe was in", "choices": ["a. Newfoundland", "b. China", "c. India", "d. Africa", "e. the Americas"], "answer": "the Americas"}, {"id": 17, "question": "The forced labor system in which Amerindian men in Peru worked two to four months of the year in the mines was", "choices": ["a. the rota.", "b. the milla.", "c. the mita.", "d. the colo system.", "e. the puri."], "answer": "the mita."}, {"id": 18, "question": "One of the major reasons for the growth of the world population after 1700 was", "choices": ["a. recovery from the plague", "b. the spread of more high-calorie per acre staple crops like maize and potatoes from the New World", "c. exposure of the different populations to each other strengthened the global immune system", "d. the transition to a mercantile, cash-based economy", "e. large-scale development of the plantation economy in the new world and the growth of staple crops"], "answer": "the spread of more high-calorie per acre staple crops like maize and potatoes from the New World"}, {"id": 19, "question": "The hybrid culture of African and American was most \"standardized\" by the evolution of a common idiom along the Carolina coast called:", "choices": ["a. Swahili", "b. Yoruba.", "c. Sotho-Tswana", "d. Gullah", "e. Bantu"], "answer": "Gullah"}, {"id": 20, "question": "The castas of Latin America included mixed-race peoples such as", "choices": ["a. palenques and puccis.", "b. aryans and assyrians.", "c. creoles and cajuns.", "d. mestizos and mulattos.", "e. serbs and slavs."], "answer": "mestizos and mulattos."}, {"id": 21, "question": "What effect did European horses have on the Americas?", "choices": ["a. Increased military capacity and hunting efficiency", "b. The decline in the alpaca population", "c. No impact because religious prohibitions prevented its use", "d. Decreased military capacity and hunting efficiency", "e. No appreciable impact because they already had the horse"], "answer": "Increased military capacity and hunting efficiency"}, {"id": 22, "question": "In Virginia, colonial government consisted of a governor, his council, and elected representatives known as the", "choices": ["a. Assembly of Freemen.", "b. House of Burgesses.", "c. House of Elders.", "d. House of Payne.", "e. House of Lords."], "answer": "House of Burgesses."}, {"id": 23, "question": "The Ming Empire attempted to reestablish Chinese predominance and prestige in the Indian Ocean by", "choices": ["a. building \"artificial\" islands", "b. sending out seven imperial fleets between 1405 and 1433", "c. establishing maritime courts to deal with pirates and privateers", "d. attempting to defeat the Portuguese in the famous sea battle of Calcutta", "e. employing Mongol horsemen to travel the Silk Road"], "answer": "sending out seven imperial fleets between 1405 and 1433"}, {"id": 24, "question": "An early motivation for Portuguese maritime exploration was to", "choices": ["a. find the Christian kingdom of Prester John", "b. discover the \"New World\"", "c. quell political dissent", "d. find buried treasure near Madagasacar", "e. gain access to the sub-Saharan gold trade"], "answer": "gain access to the sub-Saharan gold trade"}, {"id": 25, "question": "The maritime revolution was sailing northwest into the Atlantic to the latitude of the Azores and then", "choices": ["a. understanding that the lost island of Atlantis was accessible via caravel", "b. recognizing that the caravel was unsuited for voyages of exploration", "c. learning that the magnetic compass did not work while at sea", "d. improving the ship design by Thomas of Caravel", "e. in order to speedily return by riding westerly winds"], "answer": "in order to speedily return by riding westerly winds"}, {"id": 26, "question": "What two nations began a maritime revolution that profoundly altered the course of world history?", "choices": ["a. England and France", "b. China and Japan", "c. Portugal and Spain", "d. Germany and Russia", "e. Greece and Italy"], "answer": "Portugal and Spain"}, {"id": 27, "question": "The Asian vessels of the Indian Ocean were called junks and", "choices": ["a. triremes", "b. galleons", "c. sloops", "d. dhows", "e. caravels"], "answer": "dhows"}, {"id": 28, "question": "The economic development of the colonies in Mexico and Peru was dominated by sugar plantations and", "choices": ["a. copper mining", "b. silver mining", "c. gold mining", "d. diamond mining", "e. rice plantations"], "answer": "silver mining"}, {"id": 29, "question": "The majority of slaves granted manumission", "choices": ["a. by order of the Catholic Church", "b. killed an opponent in the annual games at the stadium", "c. purchased their freedom", "d. pledged homage to the feudal lord", "e. were married and fathered a child"], "answer": "purchased their freedom"}, {"id": 30, "question": "Death rates among Amerindian peoples during the epidemics of the early colonial period were", "choices": ["a. average.", "b. no higher than at other times.", "c. very high.", "d. nonexistent; death rates ceased during this period.", "e. very low."], "answer": "very high."}, {"id": 31, "question": "The most influential defender of Amerindians in the early colonial period was a Catholic priest named", "choices": ["a. Diego de Landa.", "b. Diego Mendez.", "c. Juan de Zum rraga.", "d. Bartolom de las Casas.", "e. Aldo Suarez."], "answer": "Bartolom de las Casas."}, {"id": 32, "question": "What was the most deadly of the epidemics in the Americas?", "choices": ["a. Smallpox", "b. Syphilis", "c. Cholera", "d. Influenza", "e. Measles"], "answer": "Smallpox"}, {"id": 33, "question": "Why did Brazil develop more slowly than other areas of Latin America?", "choices": ["a. The local population was smaller and less urbanized, requiring a different labor structure.", "b. Difficulty to excavate the terrain.", "c. Brazil had no significant mineral wealth for exploitation.", "d. Significant indigenous population resistance to European assimilation.", "e. The Portuguese were interested in business empires, not conversion of natives."], "answer": "The local population was smaller and less urbanized, requiring a different labor structure."}, {"id": 34, "question": "In 1500, what did Portuguese mariners discover while attempting to find a favorable wind around Africa?", "choices": ["a. The east coast of South America", "b. The west coast of North America", "c. The Russian coast", "d. The North Pole", "e. The river Styx"], "answer": "The east coast of South America"}, {"id": 35, "question": "In Brazil, Amerindian slaves were increasingly ravaged by disease and warfare and were eventually superseded by", "choices": ["a. animal power.", "b. Asian slaves.", "c. African slaves.", "d. better technology.", "e. European peasants."], "answer": "African slaves."}, {"id": 36, "question": "Between 1651 and 1673 the English Navigation Acts sought to", "choices": ["a. ban importation of the printing press to America", "b. rechart the waters off the coast of North America", "c. limit the colonial manufacture of ships", "d. prevent the importation of slaves on slave ships", "e. severely limit colonial trading and production competition"], "answer": "severely limit colonial trading and production competition"}, {"id": 37, "question": "Why did the peoples of the New World lack immunity to the diseases of the Europeans?", "choices": ["a. Significant differences in dietary structure.", "b. They had a different DNA structure than Europeans.", "c. None of these.", "d. Disease did not exist in the Americas.", "e. It was due to their long isolation from other continents."], "answer": "It was due to their long isolation from other continents."}, {"id": 38, "question": "The most important agent for transmitting European beliefs, language, and culture in Spanish America and Brazil was the", "choices": ["a. Council of the Indies.", "b. Spanish and Portuguese armies.", "c. Lantern Council.", "d. Catholic Church.", "e. plantation system."], "answer": "Catholic Church."}, {"id": 39, "question": "An area of dispute between Portugal and Spain despite the Treaty of Tordesillas was the spice trade from:", "choices": ["a. Macao", "b. Indonesia", "c. Goa", "d. Singapore", "e. the Moluccas"], "answer": "the Moluccas"}, {"id": 40, "question": "One of the significant factors delaying English and French settlement of the Americas was", "choices": ["a. lack of access to the ocean.", "b. their ongoing industrial revolution.", "c. involvement in the wars of religion during the Reformation.", "d. inferior shipbuilding capabilities.", "e. lack of participation in the sugar trade."], "answer": "involvement in the wars of religion during the Reformation."}, {"id": 41, "question": "Which of the following is true of the Puritans?", "choices": ["a. They wanted to purify the Church of England, not break from it", "b. They welcomed Catholic as well as Jewish members", "c. They wanted to establish a hierarchy of bishops and priests", "d. Their efforts to reform the Church of England were welcomed", "e. They wished to break from the Church of England"], "answer": "They wanted to purify the Church of England, not break from it"}, {"id": 42, "question": "Why did Massachusetts have a lower mortality rate than southern and Caribbean colonies?", "choices": ["a. Massachusetts had a nicer climate", "b. Massachusetts was more homogenous and less hierarchal", "c. Massachusetts had more families and greater stability of population", "d. Massachusetts relied on indentured servitude rather than slavery", "e. Massachusetts was based on religion instead of commerce"], "answer": "Massachusetts had more families and greater stability of population"}, {"id": 43, "question": "The two groups of Protestant dissenters that colonized New England were", "choices": ["a. Puritans and Pilgrims", "b. Questers and Seekers", "c. Congregationalists and Presbyterians", "d. Quakers and Shakers", "e. Shakers and Mormons"], "answer": "Puritans and Pilgrims"}, {"id": 44, "question": "Early Spanish and Portuguese settlers in the Americas sought to institute colonial societies similar to the Old World including patriarchal families networks founded on this religion.", "choices": ["a. Catholic", "b. Puritan", "c. none of these", "d. Protestant", "e. Anglican"], "answer": "Catholic"}, {"id": 45, "question": "Columbus insisted that he had reached", "choices": ["a. the New World", "b. Malacca", "c. China", "d. the West Indies", "e. the Indian Ocean"], "answer": "the Indian Ocean"}, {"id": 46, "question": "Within fifteen years of its settlement, the colony at Jamestown lost ____ percent of its population:", "choices": ["a. 80", "b. 10", "c. 20", "d. 40", "e. 60"], "answer": "80"}, {"id": 47, "question": "By the end of the sixteenth century, Portugal controlled the Brazilian coast while this country controlled most of the remaining areas of Central and South America.", "choices": ["a. France", "b. England", "c. Austria", "d. Netherlands", "e. Spain"], "answer": "Spain"}, {"id": 48, "question": "Which of the following became the richest institution of the Spanish colonies?", "choices": ["a. The unions", "b. The Viceroyalty of Brazil", "c. The farmers", "d. The Catholic Church", "e. The Viceroyalty of the Rio de la Plata"], "answer": "The Catholic Church"}, {"id": 49, "question": "The greatest mariners of the Atlantic in the Early Middle Ages were", "choices": ["a. Celts", "b. Mongols", "c. Ostrogoths", "d. Vikings", "e. Lombards"], "answer": "Vikings"}, {"id": 50, "question": "Sailing in the Indian Ocean was less difficult and dangerous than in other places because", "choices": ["a. it isn't an ocean, but rather a large saltwater lake", "b. it is shallow", "c. there is less wind", "d. the monsoon winds are predictable", "e. there are no sharks"], "answer": "the monsoon winds are predictable"}, {"id": 51, "question": "An encomienda was", "choices": ["a. a form of forced labor and tribute.", "b. an agreement with Amerindians.", "c. a plantation for growing sugar.", "d. a disease of the lower intestine.", "e. a plantation for mining precious metals."], "answer": "a form of forced labor and tribute."}, {"id": 52, "question": "In colonial Spain, a term used to describe Spanish lesser nobles.", "choices": ["a. castas.", "b. palenques.", "c. baronettes.", "d. creoles.", "e. hidalgos."], "answer": "hidalgos."}, {"id": 53, "question": "Prince Henry of Portugal was known as Henry the Navigator because", "choices": ["a. he designed the compass", "b. he was the first person to round the Cape of Good Hope", "c. he devoted his life to promoting exploration", "d. he discovered America", "e. \"navigator\" means conqueror in Portuguese"], "answer": "he devoted his life to promoting exploration"}, {"id": 54, "question": "The leaders of French expansion, the coureurs de bois, were", "choices": ["a. Jesuits converting natives", "b. Frenchmen living among the natives", "c. an elite French commando unit", "d. Indian fur traders", "e. Englishmen who fought with the French"], "answer": "Frenchmen living among the natives"}, {"id": 55, "question": "The Chinese treasure ships of Zheng He carried", "choices": ["a. soldiers to fight the Japanese pirates in the Sea of Japan", "b. people and animals as settlers for far-flung colonies", "c. salted fish", "d. silk, metals and other valuable goods as gifts for distant rulers", "e. balsa wood for buoyancy"], "answer": "silk, metals and other valuable goods as gifts for distant rulers"}, {"id": 56, "question": "The Viceroyalty of New Spain in 1535, with its capital in Mexico City, encompassed", "choices": ["a. Mexico, California, and Oregon.", "b. Florida, St. Lucia, and Dominica.", "c. Brazil, Paraguay, and Roanoke.", "d. Mexico, Central America, and the Caribbean islands.", "e. Alaska, Siberia, and Central America."], "answer": "Mexico, Central America, and the Caribbean islands."}, {"id": 57, "question": "What factors combined to make Spain one of the most powerful European states in the 16th century?", "choices": ["a. Expulsion of the Muslims from Spain in 1492", "b. The marriage of Ferdinand of Aragon and Isabel of Castile", "c. Being the center of intellectual development in Europe", "d. Political alliances with the Abbasid Caliphate", "e. Spain's influence with the Catholic church"], "answer": "The marriage of Ferdinand of Aragon and Isabel of Castile"}, {"id": 58, "question": "Christopher Columbus was a Genoese mariner employed by", "choices": ["a. Genoa", "b. Spain", "c. Portugal", "d. Sicily", "e. Syracuse"], "answer": "Spain"}, {"id": 59, "question": "The Treaty of Tordesillas in 1494 divided the New World between", "choices": ["a. Portugal and Malacca", "b. Spain and Genoa", "c. Spain and China", "d. Spain and Portugal", "e. Islamic Africa and Christian America"], "answer": "Spain and Portugal"}, {"id": 60, "question": "The Portuguese contribution to shipbuilding was the creation of this highly maneuverable three-masted ship:", "choices": ["a. junk", "b. caravel", "c. galleon", "d. dhow", "e. trireme"], "answer": "caravel"}, {"id": 61, "question": "Two important navigational technologies, the magnetic compass and the astrolabe", "choices": ["a. were invented by Columbus", "b. were held by an exclusive English patent", "c. were of Italian origin", "d. were of Chinese and Arab or Greek origin, respectively", "e. were invented by Henry the Navigator"], "answer": "were of Chinese and Arab or Greek origin, respectively"}, {"id": 62, "question": "The first Portuguese explorer to reach the southern tip of Africa and view the Indian Ocean was", "choices": ["a. Vasco da Gama", "b. Ferdinand Magellan", "c. Jesus Alou", "d. Bartolomeu Dias", "e. Prince Henry"], "answer": "Bartolomeu Dias"}, {"id": 63, "question": "The difference between the Spanish Empire and the Portuguese Empire was that", "choices": ["a. the motives of the Portuguese Empire were purely economic", "b. the Spanish Empire was a trading empire, while the Portuguese Empire was a territorial empire", "c. the Spanish Empire was a territorial empire, while the Portuguese Empire was a trading empire", "d. the Spanish Empire was only an \"intellectual\" empire", "e. the motives of the Spanish were purely religious"], "answer": "the Spanish Empire was a territorial empire, while the Portuguese Empire was a trading empire"}], "quiz8": [{"id": 1, "question": "Workers around the world primarily sought change", "choices": ["a. by striking.", "b. by overthrowing political institutions.", "c. by changing jobs.", "d. through radical socialist ideology.", "e. by participating in the political system through voting."], "answer": "by participating in the political system through voting."}, {"id": 2, "question": "Industrialization in Russia took significantly longer because:", "choices": ["a. Serfdom was the predominant labor model until 1861.", "b. All of these", "c. wealthy landowners blocked most reforms in Russia.", "d. There was almost no commercial middle class in Russia", "e. Tsars were suspicious and conservative."], "answer": "All of these"}, {"id": 3, "question": "Suffragists, led by Elizabeth Stanton and Susan Anthony in the U.S., lobbied for which reform of women's lives?", "choices": ["a. workers rights.", "b. elimination of prostitution.", "c. the right to vote.", "d. equal wages.", "e. access to universities."], "answer": "the right to vote."}, {"id": 4, "question": "Leaders of Meiji Japan planned to remain free from Western imperialism by centralization, imperialism and", "choices": ["a. using propaganda to make Japanese people hostile to Westerners.", "b. negotiating with Western diplomats.", "c. becoming a world-class industrial power.", "d. restricting Western access to Japan.", "e. keeping out all foreign influences."], "answer": "becoming a world-class industrial power."}, {"id": 5, "question": "Which of the following was an idea associated with liberalism?", "choices": ["a. The need for a constitutional government", "b. The need for a national parliament", "c. Freedom of expression", "d. The sovereignty of the people", "e. all of the these"], "answer": "all of the these"}, {"id": 6, "question": "What were the significant differences between contenders for control of the Communist Party after Lenin’s death in 1924?", "choices": ["a. Trotsky argued for the continuation of the NEP.", "b. There was no significant difference in policies; it was a personal rivalry between Stalin and Trotsky.", "c. Stalin wanted to focus on communism’s establishment in Russia, and he believed socialism could survive “in one country.”", "d. Trotsky advocated maintaining an alliance with China, convinced that an Eastern Bloc of Communism could overthrow the industrialized West.", "e. Stalin wanted an alliance with Germany and Italy because fascism seemed the best way to industrialize Russia rapidly."], "answer": "Stalin wanted to focus on communism’s establishment in Russia, and he believed socialism could survive “in one country.”"}, {"id": 7, "question": "The political orientation of the Guomindang after 1925 was", "choices": ["a. National Socialist", "b. Communist.", "c. Socialist Republicans.", "d. Monarchist.", "e. Authoritarian."], "answer": "Authoritarian."}, {"id": 8, "question": "In 1923, Mustafa Kemal (Atatürk) turned Turkey into", "choices": ["a. a Communist state.", "b. a sultanate.", "c. an Islamic state.", "d. a “mega-state” through its merger with Greece.", "e. a secular republic."], "answer": "a secular republic."}, {"id": 9, "question": "The Russian army during the war", "choices": ["a. had poorly trained and equipped soldiers.", "b. had incompetent generals.", "c. was very large but poorly supplied and led.", "d. was the largest army in the world.", "e. all of the above."], "answer": "all of the above."}, {"id": 10, "question": "German civilians during the war were significantly affected by:", "choices": ["a. a \"turnip winter\"", "b. crop failures", "c. rationing in favor of the military.", "d. all of these.", "e. British blockages of supply deliveries."], "answer": "all of these."}, {"id": 11, "question": "The British nineteenth-century attitude toward Europe has been called a policy of", "choices": ["a. divide and conquer.", "b. ignorance is bliss.", "c. splendid isolation.", "d. arrogance and conceit.", "e. laissez-faire."], "answer": "splendid isolation."}, {"id": 12, "question": "The most influential idea of the nineteenth century was nationalism which", "choices": ["a. hastened the disintegration of the Ottoman Empire.", "b. was defined as a community unified by history and culture.", "c. was a force for unity in Europe.", "d. all of the above", "e. hastened the disintegration of the Austro-Hungarian Empire."], "answer": "all of the above"}, {"id": 13, "question": "According to Marx, the end of worker exploitation would occur when", "choices": ["a. free democracy replaced all entrenched monarchies in Europe.", "b. workers would revolt and create a dictatorship of the proletariat.", "c. war broke out and the Western industrialized, Christian world conquered the East.", "d. scientific socialism was proven by the intellectuals.", "e. war broke down barriers of nationalism and included colonist countries."], "answer": "workers would revolt and create a dictatorship of the proletariat."}, {"id": 14, "question": "The early-twentieth-century Chinese plan for reform, though tried in vain, was the", "choices": ["a. self-strengthening movement.", "b. Cixi reforms.", "c. Mandate of Heaven.", "d. imperial restoration.", "e. Great Leap Forward."], "answer": "self-strengthening movement."}, {"id": 15, "question": "Care and support of the new infrastructure by municipal governments included which of the following?", "choices": ["a. garbage removal.", "b. health inspectors.", "c. fire protection.", "d. police protection.", "e. all of the above"], "answer": "all of the above"}, {"id": 16, "question": "Japanese economic prosperity depended primarily on", "choices": ["a. foreign trade.", "b. conscripted labor from the rural areas to further industrialization.", "c. Chinese raw materials.", "d. diplomatic relations to maintain open sea ports across the Pacific.", "e. stability of weather."], "answer": "foreign trade."}, {"id": 17, "question": "Zionism was supported as an official policy by which country in the form of a declaration by the foreign secretary?", "choices": ["a. France", "b. Britain", "c. Germany", "d. The Ottoman Empire", "e. Russia"], "answer": "Britain"}, {"id": 18, "question": "Vladimir Lenin was the leader of the", "choices": ["a. Social Revolutionaries.", "b. Mensheviks.", "c. Young Turks.", "d. Provisional Government.", "e. Bolsheviks."], "answer": "Bolsheviks."}, {"id": 19, "question": "What turned the political assassination of Franz Ferdinand into a world-wide event involving all of the Great Powers was:", "choices": ["a. the familial squabbles of the royal houses of Europe, all grandchildren of Queen Victoria.", "b. the entry of the United States into the fray of war.", "c. the pre-existing system of alliances triggered a chain of events beyond political control.", "d. the opportunity to incite revolution in China and Russia.", "e. competition among industrialized nations."], "answer": "the pre-existing system of alliances triggered a chain of events beyond political control."}, {"id": 20, "question": "The Communist Party’s long-term vision of the Soviet Union focused on creating:", "choices": ["a. a military industrial complex to gain revenge on the Germans.", "b. a modern industrial economy without private property.", "c. a temporary state of capitalism followed by annihilation of the propertied classes.", "d. world domination.", "e. a balanced economy with agriculture and industry under the auspices of the bourgeoisie."], "answer": "a modern industrial economy without private property."}, {"id": 21, "question": "What were some of the effects of building railroads was", "choices": ["a. all of the above", "b. deforestation.", "c. vast consumption of lumber.", "d. a and b only", "e. consumed large amounts of land."], "answer": "all of the above"}, {"id": 22, "question": "The Victorian Age refers to rules of behavior and family wherein", "choices": ["a. feminine virtues of beauty and kindness.", "b. the home was idealized as a peaceful and loving refuge.", "c. masculine ideas of strength and courage.", "d. a and b only", "e. all of the above"], "answer": "all of the above"}, {"id": 23, "question": "Bismarck's plan to unite most German-speaking people into a single state focused on using", "choices": ["a. democracy and liberalism.", "b. Prussian industry and German nationalism.", "c. ethnicity and race.", "d. liberalism and language.", "e. religion and conservatism."], "answer": "Prussian industry and German nationalism."}, {"id": 24, "question": "The Meiji rulers sought to strengthen Japan by", "choices": ["a. rejecting all foreign ideas and restoring traditional Japanese customs.", "b. embracing foreign ideas, institutions, and techniques.", "c. attacking the United States naval bases in Korea.", "d. defeating Russia in the Russo-Japanese War.", "e. increasing family values."], "answer": "embracing foreign ideas, institutions, and techniques."}, {"id": 25, "question": "The southern Japanese provincial leaders of Choshu and Satsuma found the most effective strategy to protect Japan against foreigners was", "choices": ["a. embrace westernization in all forms.", "b. to copy the Tanzimat reforms.", "c. development of gunboats.", "d. none of these.", "e. consolidation of their forces to overthrow the shogunate."], "answer": "consolidation of their forces to overthrow the shogunate."}, {"id": 26, "question": "Who was the leader of the British Zionist movement?", "choices": ["a. Theodore Herzl", "b. Chaim Weizmann.", "c. Max Planck", "d. Claude Shannon", "e. Albert Einstein"], "answer": "Theodore Herzl"}, {"id": 27, "question": "Which of the following was included in Lenin’s plan for Russia?", "choices": ["a. A transfer of all power to the soviets", "b. None of the above", "c. Transfer of factories to the workers", "d. Immediate surrender to Germany", "e. Transfer of land to the peasants"], "answer": "None of the above"}, {"id": 28, "question": "Because of the influx of refugees after the war, which countries passed immigration laws restricting immigration?", "choices": ["a. New Zealand", "b. the United States", "c. Canada", "d. Australia", "e. all of the above"], "answer": "all of the above"}, {"id": 29, "question": "During World War I, African Americans in the United States", "choices": ["a. gained equality with whites.", "b. were not allowed in the armed forces.", "c. faced even greater discrimination than previously.", "d. migrated to the cities of the north in vast numbers from the rural South.", "e. were restricted to agricultural work."], "answer": "migrated to the cities of the north in vast numbers from the rural South."}, {"id": 30, "question": "Britain's main concern about the Turks was", "choices": ["a. that they would not allow the British access to archeological digs in the Near East.", "b. that the Turks would close off British access to the East.", "c. getting revenge after they lost at Gallipoli.", "d. to protect Protestant (Christian) forces in the Ottoman Empire.", "e. that they would take all of Britain's colonies in Africa."], "answer": "that the Turks would close off British access to the East."}, {"id": 31, "question": "When the typewriter and telephone were first used in business in the 1880s,", "choices": ["a. businessmen found that they were ideal tools for women workers.", "b. only men could use them.", "c. widespread job losses resulted.", "d. they created new jobs for immigrant workers.", "e. they were a failure because people feared new inventions."], "answer": "businessmen found that they were ideal tools for women workers."}, {"id": 32, "question": "Families were considered middle class only if they", "choices": ["a. did not work with their hands.", "b. owned their own horses.", "c. were college-educated.", "d. had a second home.", "e. employed a full-time servant."], "answer": "employed a full-time servant."}, {"id": 33, "question": "Karl Marx asserted the resources of government and industry could", "choices": ["a. none of these", "b. be harnessed to end poverty and injustice.", "c. not maintain proper cost of goods in the marketplace.", "d. be appropriate for profit in business.", "e. be used to allow business owners were able to put into the bank."], "answer": "be harnessed to end poverty and injustice."}, {"id": 34, "question": "Urban planning methods in replacing old, crowded cities included", "choices": ["a. laying out new cities, such as Chicago, on rectangular grids.", "b. creating planned communities with all amenities within walking distance of miniature villages.", "c. organizing neighborhoods according to immigrant nationality.", "d. removing vestiges of medieval town halls.", "e. maintaining traditional streets to appeal to national historical memory."], "answer": "laying out new cities, such as Chicago, on rectangular grids."}, {"id": 35, "question": "In Tokugawa Japan, the political power rested in the hands of the", "choices": ["a. shoguns.", "b. peasantry.", "c. bureaucracy.", "d. merchants.", "e. emperor."], "answer": "shoguns."}, {"id": 36, "question": "During the campaigns in the Caucasus and eastern Anatolia, Turkish military maneuvers deliberately caused", "choices": ["a. suppression of secularization within the Turkish state.", "b. the destruction of naval access to the Aral Sea.", "c. a confrontation with Italian troops who had not honored their part of the Triple Alliance.", "d. the forced death march of hund
