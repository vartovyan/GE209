y on a single ethnic or kinship group"}, {"id": 31, "question": "Which of the following does not constitute a shared cultural heritage, or what anthropologists classify as \"great traditions\"?", "choices": ["a. Ethical codes", "b. Intellectual traditions", "c. Common legal and belief systems", "d. Political unity", "e. A written language"], "answer": "Political unity"}, {"id": 32, "question": "The savannah region of Africa was characterized by", "choices": ["a. tropical rain forests", "b. desert", "c. long grasses and scattered forests", "d. lush oases with water and palm trees", "e. semiarid steppes"], "answer": "long grasses and scattered forests"}, {"id": 33, "question": "What facilitated the spread of Christianity to Armenia?", "choices": ["a. The creation of new Christian myths that included Armenian folklore", "b. The excellent management of the Christian church", "c. The invention of an Armenian alphabet in the early fifth century", "d. The prejudices against Buddhist monks in the cities", "e. The high taxation of non-Christians in Armenia"], "answer": "The invention of an Armenian alphabet in the early fifth century"}], "quiz5": [{"id": 1, "question": "The scholar Nasir al-Din Tusi, who wrote on history, poetry, ethics and religion, was most notable for his contributions in", "choices": ["a. mathematical developments in algebra and trigonometry.", "b. poetry written in Persian.", "c. an encompassing world history.", "d. cartography.", "e. translation of philosophy."], "answer": "mathematical developments in algebra and trigonometry."}, {"id": 2, "question": "To maintain control of vast areas, the Mongols formed different khanates. The Golden Horde ruled over Russia and the Chagatai ruled over", "choices": ["a. Central Asian domains.", "b. Japan.", "c. India.", "d. Korea.", "e. Russia."], "answer": "Central Asian domains."}, {"id": 3, "question": "Traditions relating the deeds and words of prophet Muhammad which, next to the Qur'an, are the most importance source for Islamic law, are called", "choices": ["a. ulama", "b. none of these", "c. umma", "d. shari'a", "e. hadith"], "answer": "hadith"}, {"id": 4, "question": "The foundation of Islamic civilization is the Shari'a, or", "choices": ["a. community.", "b. literature.", "c. law.", "d. philosophy.", "e. taxes."], "answer": "law."}, {"id": 5, "question": "Despite the fact that conversions to Islam were at their peak, Abbasid power declined because", "choices": ["a. there were frequent religious wars between the Sunnis and Shi'ites.", "b. the empire had to resist nomadic pressures on the frontier.", "c. the empire had become too big to rule effectively.", "d. new religious practices developed that challenged the appeal of Islam.", "e. there were constant revolts of non-Muslims against forced conversion."], "answer": "the empire had become too big to rule effectively."}, {"id": 6, "question": "Prophet Muhammad's revelations from the angel are compiled in a book called", "choices": ["a. the Quran.", "b. the Third Testament.", "c. the Revelations.", "d. the Hadith.", "e. the Ka'ba."], "answer": "the Quran."}, {"id": 7, "question": "The unified community that accepted Islam and believed that Muhammad was the \"Messenger of God\" was called the", "choices": ["a. umma.", "b. shaitan.", "c. jihad.", "d. ka'ba.", "e. hijra."], "answer": "umma."}, {"id": 8, "question": "Which of the Mongol Khans attacked Russian territories and took control of towns along the Volga?", "choices": ["a. Batu", "b. Ögödei", "c. Genghis", "d. Güyük", "e. Khubilai"], "answer": "Batu"}, {"id": 9, "question": "After rejection by his family for the title of Great Khan, Khubilai formed", "choices": ["a. the Yuan Empire in China and Siberia.", "b. the Golden Horde.", "c. he was assassinated by political rivals.", "d. the Central Asian Khanate.", "e. Il-Khan Empire of Iran."], "answer": "the Yuan Empire in China and Siberia."}, {"id": 10, "question": "In 1368, the Yuan Empire was overthrown and replaced by the", "choices": ["a. Ming Empire.", "b. Song Empire.", "c. Tang Empire.", "d. Yi Kingdom.", "e. Manchu Empire."], "answer": "Ming Empire."}, {"id": 11, "question": "What did the Sasanid and Byzantine Empires have in common?", "choices": ["a. a shared distaste for Christianity.", "b. dependence on camels", "c. societal unrest because of religious heterogeneity.", "d. a military emphasis on cavalry", "e. central control of imperial finances."], "answer": "central control of imperial finances."}, {"id": 12, "question": "Why did the rulers of al-Andalus Spain finally take the title of caliph in 929?", "choices": ["a. They did so in response to the Fatimids assuming this title in Tunisia.", "b. The growing number of converts to Islam demanded it.", "c. They never did.", "d. They had finally solidified control of the region.", "e. Christians in northern Spain threatened invasion."], "answer": "They did so in response to the Fatimids assuming this title in Tunisia."}, {"id": 13, "question": "The rise of literacy in Korea resulted from the", "choices": ["a. spread of woodblock printing from China and the Mongol writing system.", "b. combination of an improved printing system and the han'gul writing system.", "c. popularity of Islam, which required that all Muslims read the Quran.", "d. imposition of Japanese rule, which forced the formation of public schools.", "e. institution of a university system."], "answer": "combination of an improved printing system and the han'gul writing system."}, {"id": 14, "question": "Despite political decay in al-Andalus, under Islamic leadership, the Jewish people of Spain", "choices": ["a. experienced a diaspora to eastern Europe.", "b. experienced widespread discrimination.", "c. were frequently arrested and persecuted.", "d. contributed to the cultural growth of Spain as great thinkers and writers, such as Maimonides.", "e. passed laws ensuring the ascension of Jews to the Spanish throne."], "answer": "contributed to the cultural growth of Spain as great thinkers and writers, such as Maimonides."}, {"id": 15, "question": "In 1295, the Il-khan ruler Ghazan converted to which religion?", "choices": ["a. Buddhism", "b. Christianity", "c. Islam", "d. Shinto", "e. Judaism"], "answer": "Islam"}, {"id": 16, "question": "Menial work in Mongol camps was done by", "choices": ["a. children.", "b. slaves", "c. women", "d. all of these.", "e. gendered division of labor"], "answer": "slaves"}, {"id": 17, "question": "The Mongol leader, the khan,", "choices": ["a. had no power to make decisions but retained a veto.", "b. had absolute power in decision making.", "c. deferred to the Mongol Parliament.", "d. was a figurehead only.", "e. had his decisions ratified by a council."], "answer": "had his decisions ratified by a council."}, {"id": 18, "question": "Which group held the lowest social rank in Yuan China?", "choices": ["a. Southern Chinese", "b. Northern Chinese", "c. Middle Easterners", "d. Mongols", "e. Central Asians"], "answer": "Southern Chinese"}, {"id": 19, "question": "The capital of the Umayyad caliphate was in", "choices": ["a. Antioch", "b. Baghdad", "c. Ephesus", "d. Mecca.", "e. Damascus"], "answer": "Damascus"}, {"id": 20, "question": "After prophet Muhammad's death, the Muslim community", "choices": ["a. chose a successor (caliph), Abu Bakr.", "b. searched the entire peninsula for a suitable successor, according to prophet Muhammad's last instructions.", "c. held general elections to replace prophet Muhammad.", "d. abandoned the orthodox teachings of Islam.", "e. embraced his wife, Khadija, as his successor."], "answer": "chose a successor (caliph), Abu Bakr."}, {"id": 21, "question": "What does Islam call on people to believe?", "choices": ["a. All of these.", "b. That the Qur'an is the revelation of Allah.", "c. That they must surrender to the will of God.", "d. That Islam is the one true religion.", "e. That Allah will reward or punish all people after death."], "answer": "All of these."}, {"id": 22, "question": "Muslim means", "choices": ["a. chosen for purity.", "b. the one true religion.", "c. first followers.", "d. holy people.", "e. one who submits to the will of God."], "answer": "one who submits to the will of God."}, {"id": 23, "question": "Why did Muhammad leave Mecca for Medina (known as the hijra, which marks the beginning of the Muslim calendar)?", "choices": ["a. Meccan leaders were threatened by his popularity.", "b. One of his visions commanded him to.", "c. Theology argued that Abraham had lived in the north.", "d. Muhammad's wife had family in Medina.", "e. He sought more followers in the north."], "answer": "Meccan leaders were threatened by his popularity."}, {"id": 24, "question": "The Sasanid Empire benefited from its location along the Silk Road. Some of the agricultural goods that it gained from China and East Asia were", "choices": ["a. sugar, wheat, and figs.", "b. eggplants, sugar, and rice.", "c. wheat, jute, and coffee beans.", "d. oats, quinoa, and manioc.", "e. mangoes, bananas, and spelt."], "answer": "eggplants, sugar, and rice."}, {"id": 25, "question": "The emperor Yongle improved the imperial complex built by the Mongols, called the", "choices": ["a. Heavenly Gates.", "b. Imperial House.", "c. Red Square.", "d. Forbidden City.", "e. Dragon's Court."], "answer": "Forbidden City."}, {"id": 26, "question": "In 1453, the Ottomans led by Sultan Mehmet II captured which important Christian city of the Byzantine Empire?", "choices": ["a. Vienna", "b. Paris", "c. Constantinople", "d. Kiev", "e. Budapest"], "answer": "Constantinople"}, {"id": 27, "question": "The Russian prince who advocated cooperation with the Mongols to avoid destructive assimilation was", "choices": ["a. Vladimir the Viking.", "b. Alexander Nevskii.", "c. Dmitri Donskoi.", "d. Grigorii Preobrazhenskii.", "e. Ivan III."], "answer": "Alexander Nevskii."}, {"id": 28, "question": "Who attempted to write the first world history?", "choices": ["a. The Abbasid caliph", "b. Marco Polo", "c. Ibn Battuta", "d. Ivan III", "e. Rashid al-Din"], "answer": "Rashid al-Din"}, {"id": 29, "question": "The decline of the Umayyad dynasty was due to", "choices": ["a. the arrival of a Jewish messiah.", "b. converts to Islam numbered no more than 10 percent.", "c. none of these.", "d. a peasant revolt over increases in taxes and decreases in wages.", "e. growing unrest among non-Arab Muslims, who demanded access to political power."], "answer": "growing unrest among non-Arab Muslims, who demanded access to political power."}, {"id": 30, "question": "As a result of the Il-Khan attempt to repel them in the Crimean/Caucases areas, the Golden Horde formed an alliance with:", "choices": ["a. Buddhists in India.", "b. Persian Muslims.", "c. Seljuk Turks.", "d. Egyptian Mamluks.", "e. Byzantine (Ottoman) Janissary forces."], "answer": "Egyptian Mamluks."}, {"id": 31, "question": "Ming China didn't develop seafaring for commercial and military because commercial maritime expectations fell short and:", "choices": ["a. The peasantry were a strong voting lobby and refused to support it.", "b. The merchants were opposed to losing their domestic markets.", "c. The emperor feared outside contacts and influence.", "d. The Japanese merchants undercut the market and stole China's trading partners.", "e. The Mongol threat from the north and west took priority over seafaring."], "answer": "The Mongol threat from the north and west took priority over seafaring."}, {"id": 32, "question": "The Arabs' involvement in Byzantine and Sasanid conflicts led to the penetration of these religions into the Arabian peninsula.", "choices": ["a. Judaism and Christianity", "b. Christianity and Buddhism", "c. Zoroastrianism and Christianity", "d. Zoroastrianism and Buddhism", "e. Judaism and Buddhism"], "answer": "Zoroastrianism and Christianity"}, {"id": 33, "question": "Which Russian ruler was the first to use the term \"tsar\" (Latin for caesar)?", "choices": ["a. Alexander Nevskii", "b. Catherine the Great", "c. Ivan IV", "d. Ivan III", "e. Peter the Great"], "answer": "Ivan III"}, {"id": 34, "question": "After the city of Mecca surrendered to prophet Muhammad, he established a new state based on a", "choices": ["a. government system similar to the Persian administration.", "b. dynastic system with his sons as the monarchs.", "c. loose coalition of Arab city-states.", "d. democratic government system.", "e. common religious faith."], "answer": "common religious faith."}, {"id": 35, "question": "A significant transmission and sharing of scientific knowledge originating in the Middle East and reaching Europe and India was found in the form of:", "choices": ["a. eclipse predictions and tables.", "b. networked astronomical observatories.", "c. a centralized library of shared knowledge at Tabriz.", "d. Uigher calendar calculations.", "e. formulas for alchemical processes."], "answer": "eclipse predictions and tables."}, {"id": 36, "question": "Why is the Abbasid rule considered a \"golden age\"?", "choices": ["a. It created a refined and cosmopolitan culture in Baghdad.", "b. It used the golden cow as the focus of religious worship.", "c. It used gold as the standard coinage throughout the empire.", "d. The Spanish region was considered the golden frontier.", "e. It is marked by the rule of the \"golden\" monarch, Abu Bakr."], "answer": "It created a refined and cosmopolitan culture in Baghdad."}, {"id": 37, "question": "The establishment of Zoroastrianism and Christianity as official faiths in the Sasanid and Byzantine empires (respectively) set the precedent for what future event?", "choices": ["a. The rejection of religion as an official political focus.", "b. The rise of corrupt leadership in those empires.", "c. The worldwide spread of Christianity.", "d. The rise of Islam as the focus of a political empire.", "e. The dominance of monotheism in all subsequent empires."], "answer": "The rise of Islam as the focus of a political empire."}, {"id": 38, "question": "Umayyad Spain developed a distinctive Islamic culture because of the", "choices": ["a. blending of Roman, Germanic, Jewish, Arab, and Berber traditions.", "b. blending of Islam with Roman traditions and Visigoth culture.", "c. Viking invasions of the ninth century.", "d. growing influence of Russian and Frankish traditions in Spain.", "e. decrease in Arab power combined with a growing Christian influence."], "answer": "blending of Roman, Germanic, Jewish, Arab, and Berber traditions."}, {"id": 39, "question": "One of the most significant effects of Mongol trade routes was the spread of diseases including", "choices": ["a. influenza.", "b. smallpox.", "c. all of these.", "d. typhus.", "e. bubonic plague."], "answer": "all of these."}, {"id": 40, "question": "One of the most prized commercial products of the Ming Empire was:", "choices": ["a. green or ginseng ink.", "b. wool.", "c. teakwood clocks.", "d. lightweight cannon.", "e. porcelain."], "answer": "porcelain."}, {"id": 41, "question": "Mongol rulers in China were increasingly influenced by the idea of a universal rulership model by religious leaders called lamas from", "choices": ["a. Japan.", "b. India.", "c. Tibet.", "d. Vietnam.", "e. Korea."], "answer": "Tibet."}, {"id": 42, "question": "Mu'awiya chose his own son, Yazid, to succeed him thereby establishing this caliphate.", "choices": ["a. Fatimid", "b. Mamluk", "c. Abbasid", "d. Umayyad", "e. none of these"], "answer": "Umayyad"}, {"id": 43, "question": "Religious conflicts in the Byzantine Empire resulted in treatment of Nestorian Christians as", "choices": ["a. outcasts from society who were unable to find jobs.", "b. heretics, seeking refuge under the Sasanid shah.", "c. holy, seeking the recovery of the holy lands through crusades.", "d. monks, seeking the true meaning of life in vows of poverty and chastity.", "e. converts to new faiths to avoid taxation."], "answer": "heretics, seeking refuge under the Sasanid shah."}, {"id": 44, "question": "Most subjects of both Byzantine and Sasanid rulers found common identity in", "choices": ["a. commerce.", "b. family kin groups.", "c. language.", "d. religion.", "e. occupations."], "answer": "religion."}, {"id": 45, "question": "Because Mongols controlled access to the Silk Road after the overthrow of the Yuan, the emperor Yongle put an emphasis on", "choices": ["a. maritime trade connecting with Southeast Asia and the Indian Ocean.", "b. trade through Buddhist monasteries.", "c. trans-Pacific exploration.", "d. none of these; trade decreased because people could not afford to travel by Silk Road and pay Mongol tariffs.", "e. overland trade through India and Arabia."], "answer": "maritime trade connecting with Southeast Asia and the Indian Ocean."}, {"id": 46, "question": "Which of the following statements is not true about the rule of the Seljuk Empire?", "choices": ["a. Seljuk leaders didn't get involved in internal religious fighting.", "b. Mesopotamia grew in population and influence.", "c. Cities shrank and lost population during their rule.", "d. Irrigation and canal systems fell into disrepair during their rule.", "e. They ruled the Middle East during the First Crusade."], "answer": "Mesopotamia grew in population and influence."}, {"id": 47, "question": "To demonstrate their rejection of the Mongols, the Ming emperors, starting with Hongwu,", "choices": ["a. marched all the Mongols to the Korean border.", "b. severed relations with the Middle East and Central Asia and closed the borders to foreigners.", "c. changed the official language from Mongolian to Chinese.", "d. formed close ties with the Manchu instead.", "e. built the Great Wall of China and deported all Mongols."], "answer": "severed relations with the Middle East and Central Asia and closed the borders to foreigners."}, {"id": 48, "question": "Benefits of Mongol rule in the Yuan Empire included all of the following EXCEPT", "choices": ["a. all of these", "b. transmission of knowledge and skills", "c. secure trade routes", "d. transition to tax farming instead of fixed rate method", "e. exchange of technical expertise between the East and West"], "answer": "transition to tax farming instead of fixed rate method"}, {"id": 49, "question": "Mongol armies often consisted of", "choices": ["a. Uighurs only.", "b. Chinese mercenaries.", "c. a multinational force with Mongol commanders.", "d. both male and female soldiers.", "e. ethnic Mongols only."], "answer": "a multinational force with Mongol commanders."}, {"id": 50, "question": "The Muslims fought the Battle of the Camel (656) in a dispute over the", "choices": ["a. compilation of the Quran.", "b. appointment of Abu Bakr.", "c. control of the royal treasury.", "d. Nestorian control of Yemenite lands.", "e. legitimacy of Ali as caliph."], "answer": "legitimacy of Ali as caliph."}, {"id": 51, "question": "The group of Muslims who believe the leader of Islam should be a descendant of prophet Muhammad's son-in-law is called the", "choices": ["a. Sunnis.", "b. Sufis.", "c. Hadj.", "d. Mobad.", "e. Shi'ites."], "answer": "Shi'ites."}, {"id": 52, "question": "The Mongol way of life, forced by a scarcity of resources, was largely", "choices": ["a. hunting and gathering.", "b. urbanized.", "c. pastoral.", "d. based on procurement.", "e. agricultural."], "answer": "pastoral."}, {"id": 53, "question": "Sufism was significant in being a", "choices": ["a. blending of Christian and Buddhist ideas into Islam.", "b. rejection of religious formalism.", "c. new doctrine that excluded the lower classes.", "d. quest for a direct union with God through rituals and training.", "e. attempt to convert more women to Islam."], "answer": "quest for a direct union with God through rituals and training."}, {"id": 54, "question": "What military techniques or innovations made the Choson military a formidable defensive force?", "choices": ["a. the development of poison gas canisters.", "b. compound bows and chain mail.", "c. phalanxes of soldiers deployed by rota.", "d. cannon with gunpowder-driven arrow launchers.", "e. battering rams and Trojan horses."], "answer": "cannon with gunpowder-driven arrow launchers."}, {"id": 55, "question": "The Abbasids purchased Turkic slaves, called mamluks, into military service. The mamluks eventually founded their own state in", "choices": ["a. Arabia.", "b. Egypt.", "c. Turkey.", "d. Iran.", "e. Spain."], "answer": "Egypt."}, {"id": 56, "question": "Why is the martyrdom of Husayn a significant event in Muslim history?", "choices": ["a. It marks the end of the Muslim expansion.", "b. It marks the beginning of Muslim expansion.", "c. It marks the beginning of the Islamic calendar.", "d. It marks the beginning of the sect of Shi'ism.", "e. It marks the anniversary of Jesus's crucifixion."], "answer": "It marks the beginning of the sect of Shi'ism."}, {"id": 57, "question": "Which of the following is an aspect of Mongol rule that created hardship and a sharp population decrease in China?", "choices": ["a. female infanticide", "b. Migration and flooding of the Yellow River", "c. Bubonic plague", "d. warfare", "e. all of these"], "answer": "all of these"}, {"id": 58, "question": "What economic problems did Russia see during the time of Mongol domination?", "choices": ["a. direct exchange of goods rather than purchases in currency.", "b. overzealous tax collection by Russian princes", "c. all of these.", "d. the burden of taxation carried by the peasantry.", "e. the attempt to introduce paper money by the Mongols."], "answer": "all of these."}, {"id": 59, "question": "How did the threat of Mongol invasion affect Japan?", "choices": ["a. Japanese clans took political control of their regions.", "b. Japanese monks were held hostage.", "c. Japanese merchants lost huge sums of money in the Mongolian markets.", "d. Japan reinstated direct imperial rule.", "e. The Japanese military government spent a lot of time building coastal defenses, and training and const CHAPTER_NAMES = {
  quiz1: "Quiz 1 — Early Civilizations",
  quiz2: "Quiz 2 — Bronze Age & Israel",
  quiz3: "Quiz 3 — Rome & Han China",
  quiz4: "Quiz 4 — Silk Road & Africa",
  quiz5: "Quiz 5 — Islam & Mongols",
};
const CHAPTER_KEYS = Object.keys(QUIZ_DATA);

// ══════════════════════════════════════════════════════════════════════
// STATE
// ══════════════════════════════════════════════════════════════════════
let state = loadState();
let currentMode = null;   // "quiz1"..."quiz5" or "all"
let currentPool = [];
let currentQ = null;
let answered = false;
let sessionCorrect = 0;
let sessionTotal = 0;
let batchCorrect = 0;
let batchTotal = 0;

function freshState() {
  return {
    weights: {},     // key -> weight
    seen: {},        // key -> times seen
    correct: {},     // key -> times correct
    streak: 0,
    bestStreak: 0,
    totalAnswered: 0,
    totalCorrect: 0,
  };
}
function loadState() {
  try {
    const s = JSON.parse(localStorage.getItem("quizzer_state"));
    if (s && s.weights) return s;
  } catch {}
  return freshState();
}
function saveState() { localStorage.setItem("quizzer_state", JSON.stringify(state)); }
function qKey(mode, q) { return mode + ":" + q.id; }

// ══════════════════════════════════════════════════════════════════════
// SPACED REPETITION
// ══════════════════════════════════════════════════════════════════════
function getWeight(key) { return state.weights[key] ?? 1; }

function weightedPick(pool, modePrefix) {
  const weights = pool.map(q => getWeight(modePrefix + q._srcChapter + ":" + q.id));
  const total = weights.reduce((a, b) => a + b, 0);
  let r = Math.random() * total;
  for (let i = 0; i < pool.length; i++) {
    r -= weights[i];
    if (r <= 0) return pool[i];
  }
  return pool[pool.length - 1];
}

function updateWeight(key, correct) {
  const w = getWeight(key);
  if (correct) {
    state.weights[key] = Math.max(0.5, w * 0.5);
    state.streak++;
    if (state.streak > state.bestStreak) state.bestStreak = state.streak;
    state.totalCorrect++;
  } else {
    state.weights[key] = Math.min(20, w * 3);
    state.streak = 0;
  }
  state.seen[key] = (state.seen[key] || 0) + 1;
  if (correct) state.correct[key] = (state.correct[key] || 0) + 1;
  state.totalAnswered++;
  saveState();
}

// ══════════════════════════════════════════════════════════════════════
// HOME SCREEN
// ══════════════════════════════════════════════════════════════════════
function renderHome() {
  const grid = document.getElementById("home-grid");
  grid.innerHTML = "";

  CHAPTER_KEYS.forEach(key => {
    const qs = QUIZ_DATA[key];
    const mastered = qs.filter(q => getWeight(key + ":" + q.id) < 0.6).length;
    const pct = qs.length ? Math.round(mastered / qs.length * 100) : 0;
    const card = document.createElement("div");
    card.className = "quiz-card glass";
    card.onclick = () => startQuiz(key);
    card.innerHTML = `
      <div class="card-num">${key.replace("quiz", "Chapter ")}</div>
      <div class="card-title">${CHAPTER_NAMES[key].split("—")[1]?.trim() || CHAPTER_NAMES[key]}</div>
      <div class="card-sub">${qs.length} questions</div>
      <div class="card-mastery">
        ✅ ${mastered}/${qs.length} Mastered
        <div class="mastery-bar"><div class="mastery-bar-fill" style="width:${pct}%"></div></div>
      </div>
    `;
    grid.appendChild(card);
  });

  // All chapters card
  const allCount = CHAPTER_KEYS.reduce((s, k) => s + QUIZ_DATA[k].length, 0);
  const allMastered = CHAPTER_KEYS.reduce((s, k) =>
    s + QUIZ_DATA[k].filter(q => getWeight(k + ":" + q.id) < 0.6).length, 0);
  const allPct = allCount ? Math.round(allMastered / allCount * 100) : 0;

  const allCard = document.createElement("div");
  allCard.className = "quiz-card glass";
  allCard.style.background = "linear-gradient(135deg,rgba(129,140,248,.08),rgba(168,85,247,.06))";
  allCard.onclick = () => startQuiz("all");
  allCard.innerHTML = `
    <div class="card-num" style="color:#c084fc">All Chapters</div>
    <div class="card-title">Combined Review</div>
    <div class="card-sub">${allCount} questions across 5 chapters</div>
    <div class="card-mastery">
      ✅ ${allMastered}/${allCount} Mastered
      <div class="mastery-bar"><div class="mastery-bar-fill" style="width:${allPct}%;background:linear-gradient(90deg,#c084fc,#a78bfa)"></div></div>
    </div>
  `;
  grid.appendChild(allCard);
}

// ══════════════════════════════════════════════════════════════════════
// QUIZ ENGINE
// ══════════════════════════════════════════════════════════════════════
function startQuiz(mode) {
  currentMode = mode;
  sessionCorrect = 0;
  sessionTotal = 0;
  batchCorrect = 0;
  batchTotal = 0;

  if (mode === "all") {
    currentPool = [];
    CHAPTER_KEYS.forEach(k => {
      QUIZ_DATA[k].forEach(q => {
        currentPool.push({ ...q, _srcChapter: k });
      });
    });
  } else {
    currentPool = QUIZ_DATA[mode].map(q => ({ ...q, _srcChapter: mode }));
  }

  document.getElementById("home-screen").style.display = "none";
  const qs = document.getElementById("quiz-screen");
  qs.style.display = "block";
  qs.style.animation = "none";
  qs.offsetHeight; // reflow
  qs.style.animation = "fadeUp .4s ease";

  document.getElementById("quiz-title").textContent =
    mode === "all" ? "All Chapters" : CHAPTER_NAMES[mode];
  updateStreakBadge();
  showQuestion();
}

function showQuestion() {
  answered = false;
  document.getElementById("question-area").style.display = "block";
  document.getElementById("session-summary").style.display = "none";

  const prefix = currentMode === "all" ? "" : "";
  currentQ = weightedPick(currentPool, "");
  const key = currentQ._srcChapter + ":" + currentQ.id;

  // Progress
  const totalInPool = currentPool.length;
  const seenInPool = currentPool.filter(q =>
    state.seen[q._srcChapter + ":" + q.id]
  ).length;
  const pct = totalInPool ? Math.round(seenInPool / totalInPool * 100) : 0;
  document.getElementById("progress-fill").style.width = pct + "%";

  // Counter
  const weight = getWeight(key);
  let badge = "";
  if (weight < 0.6) badge = " · <span style='color:var(--correct)'>✅ Mastered</span>";
  else if (weight > 2) badge = " · <span style='color:var(--wrong)'>⚠ Needs Review</span>";
  document.getElementById("q-counter").innerHTML =
    `Question ${sessionTotal + 1} · Seen ${state.seen[key] || 0}× · Weight ${weight.toFixed(1)}${badge}`;

  // Question text
  document.getElementById("q-text").textContent = currentQ.question;

  // Shuffle choices
  const shuffled = [...currentQ.choices].sort(() => Math.random() - 0.5);
  const choicesEl = document.getElementById("choices");
  choicesEl.innerHTML = "";

  const letters = "ABCDE";
  shuffled.forEach((choice, i) => {
    const btn = document.createElement("button");
    btn.className = "choice-btn";
    const choiceText = choice.replace(/^[a-e]\.\s*/, "");
    btn.innerHTML = `<span class="letter">${letters[i]}</span><span>${choiceText}</span>`;
    btn.dataset.choiceText = choiceText;
    btn.dataset.originalChoice = choice;
    btn.onclick = () => selectAnswer(btn, choiceText, shuffled);
    choicesEl.appendChild(btn);
  });

  // Hide next btn
  document.getElementById("next-btn").classList.remove("visible");

  // Animate card entrance
  const card = document.getElementById("question-card");
  card.style.animation = "none";
  card.offsetHeight;
  card.style.animation = "fadeUp .35s ease";
}

function selectAnswer(btn, choiceText, allChoices) {
  if (answered) return;
  answered = true;

  const key = currentQ._srcChapter + ":" + currentQ.id;
  const correctText = currentQ.answer;

  // Normalize for comparison
  const normalize = s => s.replace(/^[a-e]\.\s*/, "").trim().toLowerCase().replace(/[.\s]+$/, "");
  const isCorrect = normalize(choiceText) === normalize(correctText);

  updateWeight(key, isCorrect);
  sessionTotal++;
  batchTotal++;
  if (isCorrect) { sessionCorrect++; batchCorrect++; }
  updateStreakBadge();

  // Mark buttons
  const buttons = document.querySelectorAll(".choice-btn");
  buttons.forEach(b => {
    b.classList.add("disabled");
    const bText = b.dataset.choiceText;
    if (normalize(bText) === normalize(correctText)) {
      if (b === btn) {
        b.classList.add("correct");
      } else {
        b.classList.add("reveal-correct");
      }
    }
  });

  if (!isCorrect) {
    btn.classList.add("wrong");
  }

  document.getElementById("next-btn").classList.add("visible");
}

function nextQuestion() {
  if (!answered) return;
  // Check for batch summary every 10
  if (batchTotal >= 10) {
    showBatchSummary();
    return;
  }
  showQuestion();
}

function showBatchSummary() {
  document.getElementById("question-area").style.display = "none";
  const summary = document.getElementById("session-summary");
  summary.style.display = "block";
  summary.style.animation = "none";
  summary.offsetHeight;
  summary.style.animation = "fadeUp .4s ease";

  const pct = batchTotal ? Math.round(batchCorrect / batchTotal * 100) : 0;
  document.getElementById("batch-stat").textContent = pct + "% Accuracy";
  document.getElementById("batch-detail").textContent =
    `${batchCorrect}/${batchTotal} correct in this batch · ${sessionCorrect}/${sessionTotal} overall this session`;
}

function closeSummary() {
  batchCorrect = 0;
  batchTotal = 0;
  showQuestion();
}

function updateStreakBadge() {
  document.getElementById("streak-badge").textContent = "🔥 " + state.streak;
}

function goHome() {
  document.getElementById("quiz-screen").style.display = "none";
  document.getElementById("home-screen").style.display = "block";
  renderHome();
}

// ══════════════════════════════════════════════════════════════════════
// STATS
// ══════════════════════════════════════════════════════════════════════
function openStats() {
  const panel = document.getElementById("stats-panel");
  const overallPct = state.totalAnswered
    ? Math.round(state.totalCorrect / state.totalAnswered * 100) : 0;

  let html = `
    <h2>Statistics <button class="close-btn" onclick="closeStats()">✕</button></h2>
    <div class="stat-row"><span class="stat-label">Total Answered</span><span class="stat-value">${state.totalAnswered}</span></div>
    <div class="stat-row"><span class="stat-label">Overall Accuracy</span><span class="stat-value">${overallPct}%</span></div>
    <div class="stat-row"><span class="stat-label">Current Streak</span><span class="stat-value">🔥 ${state.streak}</span></div>
    <div class="stat-row"><span class="stat-label">Best Streak</span><span class="stat-value">⭐ ${state.bestStreak}</span></div>
  `;

  CHAPTER_KEYS.forEach(key => {
    const qs = QUIZ_DATA[key];
    let chSeen = 0, chCorrect = 0, chMastered = 0;
    qs.forEach(q => {
      const k = key + ":" + q.id;
      chSeen += state.seen[k] || 0;
      chCorrect += state.correct[k] || 0;
      if (getWeight(k) < 0.6) chMastered++;
    });
    const chPct = chSeen ? Math.round(chCorrect / chSeen * 100) : 0;
    html += `
      <div class="chapter-stat">
        <h4>${CHAPTER_NAMES[key]}</h4>
        <div class="stat-row"><span class="stat-label">Accuracy</span><span class="stat-value">${chPct}%</span></div>
        <div class="stat-row"><span class="stat-label">Mastered</span><span class="stat-value" style="color:var(--correct)">${chMastered}/${qs.length}</span></div>
        <div class="stat-row"><span class="stat-label">Times Studied</span><span class="stat-value">${chSeen}</span></div>
      </div>
    `;
  });

  html += `<button class="reset-btn" onclick="resetAll()">🗑 Reset All Progress</button>`;
  panel.innerHTML = html;
  document.getElementById("stats-overlay").classList.add("open");
}
function closeStats() { document.getElementById("stats-overlay").classList.remove("open"); }
function resetAll() {
  if (confirm("Reset ALL progress? This cannot be undone.")) {
    state = freshState();
    saveState();
    closeStats();
    renderHome();
  }
}

// ══════════════════════════════════════════════════════════════════════
// KEYBOARD SHORTCUTS
// ══════════════════════════════════════════════════════════════════════
document.addEventListener("keydown", e => {
  // Only when quiz screen is visible
  if (document.getElementById("quiz-screen").style.display !== "block") return;
  // If summary showing, enter closes it
  if (document.getElementById("session-summary").style.display === "block") {
    if (e.key === "Enter" || e.key === " ") { e.preventDefault(); closeSummary(); }
    return;
  }

  const keyMap = { "1": 0, "2": 1, "3": 2, "4": 3, "5": 4,
                   "a": 0, "b": 1, "c": 2, "d": 3, "e": 4 };
  const idx = keyMap[e.key.toLowerCase()];

  if (idx !== undefined && !answered) {
    const btns = document.querySelectorAll(".choice-btn");
    if (btns[idx]) btns[idx].click();
  }

  if ((e.key === "Enter" || e.key === " ") && answered) {
    e.preventDefault();
    nextQuestion();
  }
});

// Close stats on overlay click
document.getElementById("stats-overlay").addEventListener("click", e => {
  if (e.target === e.currentTarget) closeStats();
});

// ══════════════════════════════════════════════════════════════════════
// INIT
// ══════════════════════════════════════════════════════════════════════
renderHome();
</script>
