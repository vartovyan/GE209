reds of thousands of Armenians.", "e. the deviation of Russian troops to the southern regions off the Eastern line."], "answer": "the forced death march of hundreds of thousands of Armenians."}, {"id": 37, "question": "Woodrow Wilson’s proposal for settlement of the European affairs was based on his principle of:", "choices": ["a. liberalism.", "b. self-determination.", "c. protectorate status.", "d. home rule.", "e. mandates."], "answer": "self-determination."}, {"id": 38, "question": "Egypt in the 1920s", "choices": ["a. had “phony” independence instead of official British colonialism.", "b. was finally independent of British influence.", "c. had become one of the dominant world powers.", "d. seized control of the Suez Canal from Britain.", "e. remained a British mandate."], "answer": "had “phony” independence instead of official British colonialism."}, {"id": 39, "question": "The only German naval battle utilizing the expensive High Seas Fleet against the British Grand Fleet was at the", "choices": ["a. Sinking of the Lusitania.", "b. Battle of the Marne.", "c. Battle of the Boyne.", "d. Sinking of the Titanic.", "e. Battle of Jutland."], "answer": "Battle of Jutland."}, {"id": 40, "question": "Relative calm and prosperity came to German in the mid-1920’s when they did which of the following?", "choices": ["a. began to rebuild its industries.", "b. borrowed money from New York banks to stabilize their economy.", "c. renegotiated its debt from the “war guilt clause”", "d. all of the above.", "e. joined the League of Nations."], "answer": "all of the above."}, {"id": 41, "question": "How was ocean shipping transformed by the mid-nineteenth century?", "choices": ["a. Steel replaced wooden hulls.", "b. There were more efficient, powerful engines.", "c. The average size of freighters increased from 200 to 7,500 tons.", "d. Propellers replaced paddle wheels.", "e. All of these."], "answer": "All of these."}, {"id": 42, "question": "Which of the following are ways that working-class women earned money to support the family?", "choices": ["a. Taking in boarders.", "b. Doing domestic service or factory work.", "c. All of these", "d. Doing piecework such as sewing and making lace, hats, or gloves.", "e. Doing laundry for people."], "answer": "All of these"}, {"id": 43, "question": "What ideology questioned the sanctity of private property?", "choices": ["a. Socialism", "b. Manichaeism", "c. Capitalism", "d. Liberalism", "e. Mercantilism"], "answer": "Socialism"}, {"id": 44, "question": "The Boxer Uprising was a series of riots", "choices": ["a. that clearly demonstrated Japanese nationalism.", "b. that rid China of the Japanese presence.", "c. that placed Japan under direct military control.", "d. encouraged by Chinese officials against foreign presence.", "e. that demonstrated the support for Christianity in China."], "answer": "encouraged by Chinese officials against foreign presence."}, {"id": 45, "question": "Who demanded that Japan open its ports for refueling of and trade with American shipping?", "choices": ["a. Cecil Rhodes", "b. Benjamin Disraeli", "c. Tsar Nicholas", "d. Matthew Perry", "e. Robert Clive"], "answer": "Matthew Perry"}, {"id": 46, "question": "After the Ottoman Empire collapsed following the First World War, the modern Turkish state", "choices": ["a. found security in embracing Islamic tradition.", "b. clung closely to traditional Turkish customs.", "c. was particularly harsh toward women’s rights.", "d. returned to feudalism.", "e. instituted many progressive reforms."], "answer": "instituted many progressive reforms."}, {"id": 47, "question": "Which of the following was true of wartime food rationing after the failure of the potato crop in 1916?", "choices": ["a. Many Americans starved.", "b. The diet of the German population was limited to one thousand calories per day.", "c. Civilians' diets remained completely unchanged while prisoners of war were starved.", "d. Food scarcity led to widespread cannibalism in Europe.", "e. The diets of the German poor improved."], "answer": "The diet of the German population was limited to one thousand calories per day."}, {"id": 48, "question": "The Union of Soviet Socialist Republics was formed in 1922 by", "choices": ["a. allying Russia, Georgia, and Lithuania.", "b. a United Nations mandate.", "c. uniting Russia, Siberia, and Kazakhstan.", "d. joining Russia and the Soviet Ukraine.", "e. unifying all communist provinces."], "answer": "joining Russia and the Soviet Ukraine."}, {"id": 49, "question": "The German crisis of 1923 was marked by", "choices": ["a. Germany recklessly printing money, causing the worst inflation the world had ever seen.", "b. Germany’s attempts to rebuild its military.", "c. the British military takeover of Berlin.", "d. German reoccupation of Alsace and Lorraine.", "e. confiscation of church property by German authorities."], "answer": "Germany recklessly printing money, causing the worst inflation the world had ever seen."}, {"id": 50, "question": "A new and potent defensive weapon in World War I was", "choices": ["a. the machine gun.", "b. the automatic pistol.", "c. napalm.", "d. poison gas.", "e. the helicopter."], "answer": "the machine gun."}, {"id": 51, "question": "Which of the following are ways that cities in industrial nations changed their character in the nineteenth century?", "choices": ["a. City planning was used.", "b. Sanitation improved and death rates decreased.", "c. Railroads with regular schedules brought food and commuters into the cities to work.", "d. Police and fire departments were created.", "e. all of the above."], "answer": "all of the above."}, {"id": 52, "question": "The nineteenth-century movement that defended workers against their employers was", "choices": ["a. liberalism.", "b. the labor union movement.", "c. Social Darwinism.", "d. millenarianism.", "e. the Wobblies."], "answer": "the labor union movement."}, {"id": 53, "question": "The \"annihilation of time and space,\" extolled by the public and the press, referred especially to", "choices": ["a. an accurate clock.", "b. transcontinental railroads.", "c. trans-Atlantic submarine telegraph cables.", "d. the development of aircraft.", "e. the science fiction musings of H. G. Wells."], "answer": "trans-Atlantic submarine telegraph cables."}, {"id": 54, "question": "The most successful leader of Italian unification efforts was the fiery revolutionary", "choices": ["a. Giuseppe Mazzinni", "b. Pope Pius IX", "c. Camillo Cavour", "d. Giuseppe Garabaldi", "e. Benito Mussolini"], "answer": "Giuseppe Garabaldi"}, {"id": 55, "question": "The negative environmental effects of nineteenth-century industrialization included which of the following?", "choices": ["a. all of the above", "b. smoke and particulate matter polluting the air.", "c. large piles of waste product and slag left behind.", "d. deforestation and reduction of agriculture for areas used for mining coal, iron, and limestone.", "e. chemical and dye materials dumped into the rivers."], "answer": "all of the above"}, {"id": 56, "question": "Which of the following were elements in the Treaty of Versailles that angered Germany?", "choices": ["a. The infamous “guilt clause”", "b. The loss of territory it sustained", "c. The amount of reparations it had to pay", "d. All of the above", "e. Elimination of the German air force"], "answer": "All of the above"}, {"id": 57, "question": "Which of the following zaibatsu was NOT one of the four which controlled most of Japan’s industry and commerce?", "choices": ["a. Sumitomo", "b. Toyota", "c. Yasuda", "d. Mitsui", "e. Mitsubishi"], "answer": "Toyota"}, {"id": 58, "question": "The British tried to defeat the Ottomans by", "choices": ["a. planning a military coup in the Ottoman army.", "b. sending the Royal Navy to bombard Syria.", "c. using an Arab army led by Faisal against the Turks.", "d. landing a large British army in Palestine.", "e. encouraging Christians to revolt."], "answer": "using an Arab army led by Faisal against the Turks."}, {"id": 59, "question": "The main beneficiaries of Japan’s prosperity in this period were the zaibatsu, who were", "choices": ["a. the wealthy former nobles.", "b. large conglomerates.", "c. young men and women of the cities.", "d. the politicians and military.", "e. farmers."], "answer": "large conglomerates."}, {"id": 60, "question": "Which of the European nations was least prepared to go to war?", "choices": ["a. Germany", "b. Russia", "c. Austro-Hungary", "d. France", "e. England"], "answer": "Russia"}, {"id": 61, "question": "By 1900, Britain controlled which of the following industries?", "choices": ["a. all of the above", "b. international banking", "c. shipping", "d. submarine cables", "e. foreign infrastructure development"], "answer": "all of the above"}, {"id": 62, "question": "As a result of immigration, between 1850-1910, the population of northern America increased by almost", "choices": ["a. three-quarters", "b. twice", "c. four-fold", "d. ten-fold", "e. half"], "answer": "four-fold"}, {"id": 63, "question": "The increase in the number of Europeans overseas was largely due to", "choices": ["a. the abolition of serfdom in Russia.", "b. epidemic disease in Europe.", "c. famine and starvation.", "d. plague spreading in Europe.", "e. a drop in the death rate."], "answer": "a drop in the death rate."}, {"id": 64, "question": "One of the most significant reforms undertaken by Japan's Meiji oligarchs was", "choices": ["a. adopting Marxist economic policies.", "b. opening schools to train Japanese students in Western science and technology.", "c. limiting the power of the emperor.", "d. All of these", "e. building a military aristocracy."], "answer": "opening schools to train Japanese students in Western science and technology."}, {"id": 65, "question": "The revolutions of 1848 convinced conservative politicians that", "choices": ["a. use of the media was the most important tool in swaying public sentiment.", "b. democracy was an unworkable system.", "c. rubber bullets were an effective deterrent to rioters.", "d. they couldn t keep the people out of politics forever.", "e. the common person should never participate in politics."], "answer": "they couldn t keep the people out of politics forever."}, {"id": 66, "question": "The Ottoman Turks signed a secret alliance with", "choices": ["a. Japan, hoping to gain Chinese territory.", "b. France, hoping to gain Italian territory.", "c. Germany, hoping to gain Russian territory.", "d. Russia, hoping to gain Austrian territory.", "e. the United States, hoping to gain Filipino territory."], "answer": "Germany, hoping to gain Russian territory."}, {"id": 67, "question": "Deaths in World War I numbered between ____ million.", "choices": ["a. 15 and 17", "b. 4 and 5", "c. 20 and 22", "d. 9 and 10", "e. 45 and 50"], "answer": "9 and 10"}, {"id": 68, "question": "Which of the following were factors in starting World War I?", "choices": ["a. Competition for resources in colonial territories to fuel ongoing technology development", "b. Nationalism", "c. All of the above", "d. Weakening of the Ottoman Empire", "e. Alliances and interactive military plans"], "answer": "All of the above"}, {"id": 69, "question": "During World War I, Africa provided over a million Africans for armed services and", "choices": ["a. united to oppose and overthrow colonial powers.", "b. three times that number were drafted as porters to carry army equipment.", "c. was the only region to prosper.", "d. didn't support the war.", "e. was the scene of the heaviest fighting."], "answer": "three times that number were drafted as porters to carry army equipment."}, {"id": 70, "question": "The early-twentieth-century system of alliances pitted the British, French, and Russians against the Triple Alliance of", "choices": ["a. the Japanese, Italians, and Germans.", "b. Austria-Hungary, Japan, and Poland.", "c. Germany, Italy, and Austria-Hungary.", "d. the Ottomans, Italians, and Chinese.", "e. Syria, Egypt, and Germany."], "answer": "Germany, Italy, and Austria-Hungary."}, {"id": 71, "question": "A conflict between men and women in radical political movements resulted in:", "choices": ["a. working class women had little time for politics.", "b. Emma Goldman and Rosa Luxemburg attracted a few followers.", "c. all of these.", "d. the reluctant realization that women s liberation would have to come second to workers rights.", "e. exclusion from trade unions and radical political parties."], "answer": "all of these."}, {"id": 72, "question": "The most prominent early use of electric current was", "choices": ["a. in steel making.", "b. in the chemical dye industry.", "c. for telegraph systems.", "d. the electric chair.", "e. for lighting."], "answer": "for lighting."}, {"id": 73, "question": "A significant point of dispute between France and Germany was", "choices": ["a. Germany s seizure of Alsace and Lorraine.", "b. Germany's support for Alfred Dreyfus.", "c. France s insistence that Strasbourg speak French.", "d. Germany s assault on French naval supremacy.", "e. Germany s desire that France get out of Africa."], "answer": "Germany s seizure of Alsace and Lorraine."}, {"id": 74, "question": "A significant source of conflict between Russia and Austro-Hungary was", "choices": ["a. Austria trying to dominate Christians in the Ottoman Empire, which Russia felt was its domain because of Orthodoxy.", "b. Austria declaring an open-border policy to Jews escaping Russian persecution.", "c. Austrian annexation of Albania.", "d. Austro-Hungary eyeing territories along the Black Sea in anticipation of the demise of the Ottomans.", "e. Austria s attempts to dominate the Balkans, which undercut Russia s role as protector of the Slavic peoples."], "answer": "Austria s attempts to dominate the Balkans, which undercut Russia s role as protector of the Slavic peoples."}, {"id": 75, "question": "Germany had a strong advantage in the chemical chemical industry because Germany", "choices": ["a. had strong cooperation between universities and industries.", "b. had government funded research.", "c. b and c only", "d. all of the these.", "e. controlled the sources for the raw materials."], "answer": "b and c only"}, {"id": 76, "question": "Which of the following resulted when far more Jewish immigrants than anticipated arrived in Palestine?", "choices": ["a. The British tried to limit Jewish immigration.", "b. Jewish settlers were smuggled in by militant Zionists.", "c. The country was torn by strikes and guerilla war.", "d. Britain was hated by both sides and much of the Arab world.", "e. all of these."], "answer": "all of these."}, {"id": 77, "question": "The event which drew the US out of neutrality and into the war by 1917 was:", "choices": ["a. pressure by Woodrow Wilson.", "b. sinking of the Lusitania in 1915.", "c. the bombing of civilians in Alsace Lorraine.", "d. German submarines attacking merchant convoys.", "e. the Zimmerman telegram."], "answer": "German submarines attacking merchant convoys."}, {"id": 78, "question": "In 1900, China’s population was", "choices": ["a. 500 million.", "b. 100 million.", "c. 400 million.", "d. 1 billion.", "e. 700 million."], "answer": "400 million."}, {"id": 79, "question": "After the crisis for leadership of the Bolshevik party, Trotsky", "choices": ["a. was expelled from the Communist party for “deviation from the party line”", "b. was given the military award of the Order of the Red Banner.", "c. co-ruled with Josef Stalin.", "d. was murdered outside the Kremlin.", "e. won from his support of the Old Bolsheviks."], "answer": "was expelled from the Communist party for “deviation from the party line”"}, {"id": 80, "question": "What was one of the fundamental weaknesses limiting the development of military strategy in Europe?", "choices": ["a. Conflicting political ideology regarding constitutional monarchies", "b. Mobilization was dependent on railroads rather than individual motor vehicles.", "c. The role of women in the workplace", "d. Proximity of nations to one another in forming alliances", "e. Lack of a common currency to pay war debts"], "answer": "Mobilization was dependent on railroads rather than individual motor vehicles."}, {"id": 81, "question": "The largest railway network in the world in 1865 was in", "choices": ["a. the United States.", "b. Canada.", "c. Japan.", "d. Mexico.", "e. Great Britain."], "answer": "the United States."}, {"id": 82, "question": "The Meiji transformed the government and incorporated", "choices": ["a. Russian practices in education, industry, and popular culture.", "b. Korean practices in education, industry, and popular culture.", "c. Chinese practices in education, industry, and popular culture.", "d. only Japanese practices.", "e. European practices in education, industry, and popular culture."], "answer": "European practices in education, industry, and popular culture."}, {"id": 83, "question": "Some women sought satisfaction outside of the home and became involved", "choices": ["a. in working as volunteer social workers or nurses.", "b. All of these", "c. in working for women s suffrage.", "d. None of these", "e. in organizing reform movements to curtail alcohol, prostitution, and child labor."], "answer": "All of these"}, {"id": 84, "question": "Once government-owned industries in Japan became profitable,", "choices": ["a. they were placed under the military.", "b. they were divided into shares and given to the poorest Japanese citizens.", "c. they were sold to private investors.", "d. the profits were used to subsidize farmers.", "e. the company was turned over to workers control."], "answer": "they were sold to private investors."}, {"id": 85, "question": "Which of the following was a result of the Russo-Japanese War in 1904-1905?", "choices": ["a. all of these", "b. Humiliation of the outdated Japanese military and the stripping of Japanese colonies in Asia.", "c. Tsar Nicholas was forced to permit an elected parliament.", "d. Tsar Nicholas II was forced to grant a constitution.", "e. b and c only"], "answer": "b and c only"}, {"id": 86, "question": "In the early twentieth century, the Ottoman Empire was referred to as the", "choices": ["a. \"Turkish Colossus.\"", "b. \"Threat from the East.\"", "c. \"Evil Empire.\"", "d. \"Scarlet Knights.\"", "e. \"Sick Man of Europe.\""], "answer": "\"Sick Man of Europe.\""}, {"id": 87, "question": "Which of the following were significant parts of Wilson’s fourteen-point plan to end the war?", "choices": ["a. Autonomy for nationalities under Ottoman rule", "b. Formation of an association of nations to ensure the independence and territorial integrity of all states", "c. All of the above", "d. German evacuation of occupied lands", "e. Inclusion of local populations to settle territorial disputes"], "answer": "All of the above"}, {"id": 88, "question": "According to the Memorandum of the General Syrian Congress in 1919 and their classification under the mandate system, the Syrians desired to have technical and economic assistance from:", "choices": ["a. The United States", "b. Turkey", "c. France", "d. Britain", "e. Egypt."], "answer": "The United States"}, {"id": 89, "question": "In the Treaty of Brest-Litovsk, Russia", "choices": ["a. secretly planned to reenter the war.", "b. gained considerable territory from Turkey.", "c. won territories from the defeated Germans.", "d. ended its horrific civil war.", "e. lost territory, including Poland, the Baltic states, and Finland."], "answer": "lost territory, including Poland, the Baltic states, and Finland."}, {"id": 90, "question": "Lenin’s New Economic Policy in 1921", "choices": ["a. allowed private merchants to trade.", "b. allowed private workshops to produce goods.", "c. allowed peasants to own land.", "d. all of the above.", "e. allowed private ownership of all but the largest businesses."], "answer": "all of the above."}, {"id": 91, "question": "The Treaty of Kanagawa of 1854", "choices": ["a. settled the Opium War.", "b. opened Japan and Korea to the United States.", "c. put an end to the Sepoy Mutiny.", "d. put an end to the Taiping Rebellion.", "e. was modeled on the unequal treaties that the West had with China."], "answer": "was modeled on the unequal treaties that the West had with China."}, {"id": 92, "question": "As a result of the revolutions of cotton cloth and sewing machines,", "choices": ["a. more women were forced to work in garment sweat-shops.", "b. the mauve decade emerged with a new trend for purple clothes.", "c. the woolen trade decreased significantly.", "d. ready-made clothing increased the number of department stores.", "e. the poor could afford to own several sets of cloths."], "answer": "the poor could afford to own several sets of cloths."}, {"id": 93, "question": "In the Communist Manifesto, Marx and Engels argued that the elimination of private property would", "choices": ["a. end the suffering of the third world.", "b. empower the workers to have a revolution.", "c. redistribute all material wealth universally.", "d. establish a new society without government.", "e. strip the bourgeoisie of their oppressive powers."], "answer": "establish a new society without government."}, {"id": 94, "question": "The most important urban technological innovation was", "choices": ["a. apartment buildings.", "b. paved roadways for transport and travel.", "c. electric streetcars and subways.", "d. pipes for water and sewage.", "e. gas lamps for lighting."], "answer": "pipes for water and sewage."}, {"id": 95, "question": "The first place where universal male suffrage became law in 1870 was in:", "choices": ["a. England.", "b. Iceland.", "c. France", "d. Germany", "e. the United States."], "answer": "the United States."}, {"id": 96, "question": "What was the result of the Boxer Rebellion of 1900?", "choices": ["a. All foreign powers fled China, creating a power vacuum.", "b. The Boxers overthrew the Dowager Empress Cixi.", "c. Opium was finally eradicated from China.", "d. Western powers and Japan captured Beijing and demanded payments.", "e. The Communists captured Beijing and Hong Kong."], "answer": "Western powers and Japan captured Beijing and demanded payments."}, {"id": 97, "question": "A unique aspect of the Western Front was", "choices": ["a. the German use of \"blitzkrieg\" on the battlefield.", "b. that women made up a small percentage of the German fighting force.", "c. that only swords were \"legal,\" so no guns were used.", "d. the stalemate that ensued for three years along a three-hundred-mile-long line of armies from Switzerland to the North Sea.", "e. that there was very little loss of life."], "answer": "the stalemate that ensued for three years along a three-hundred-mile-long line of armies from Switzerland to the North Sea."}, {"id": 98, "question": "The influenza epidemic of 1918-1919", "choices": ["a. was a germ warfare attack by the Germans.", "b. did not kill people, but killed horses.", "c. killed 20 million worldwide.", "d. killed 1 million worldwide.", "e. was contained with the use of antibiotics."], "answer": "killed 20 million worldwide."}, {"id": 99, "question": "Women during World War I", "choices": ["a. refused to support the death and destruction of war on principle.", "b. joined the work force.", "c. were largely members of the Socialist Party.", "d. used their newly won voting privileges to elect pacifist candidates.", "e. All of these"], "answer": "joined the work force."}, {"id": 100, "question": "What methods were used to gain support for the war effort?", "choices": ["a. All of the above", "b. Encouraging the growth of \"victory gardens\"", "c. Employment of women and African Americans", "d. Writing poetry to instill nationalism and pride", "e. Urging people to invest in the war with savings bonds"], "answer": "All of the above"}, {"id": 101, "question": "The concept of Social Darwinism argued that", "choices": ["a. Capitalism was the only sound economic model.", "b. Imperialism was justified by Divine Right.", "c. social and racial differences resulted from natural processes.", "d. Might makes right.", "e. Racism was justified"], "answer": "social and racial differences resulted from natural processes."}, {"id": 102, "question": "New models of urban development laid out city plans modeled after:", "choices": ["a. Paris.", "b. Chicago", "c. London.", "d. Buenos Aires", "e. St. Petersburg"], "answer": "Chicago"}, {"id": 103, "question": "Most railways were built by European or American engineers with equipment from the West. The exception to this was in", "choices": ["a. Mexico.", "b. Russia.", "c. China.", "d. the Orient Express.", "e. Japan."], "answer": "Japan."}, {"id": 104, "question": "The most important duty of middle class women was considered:", "choices": ["a. supporting her husband by creating a happy domestic sphere.", "b. maintaining moral and spiritual purity.", "c. raising children.", "d. teaching.", "e. contributing to the household economy."], "answer": "raising children."}, {"id": 105, "question": "The chemical dye industry hurt tropical nations such as India because", "choices": ["a. of those nations textile industries.", "b. Indians and other tropical peoples could not afford chemical dyes.", "c. the industry exploited workers in those countries.", "d. of the environmental impact of dye factories.", "e. those nations grew the most indigo."], "answer": "those nations grew the most indigo."}, {"id": 106, "question": "The Communist Party of the Soviet Union planned to pay for industrialization by", "choices": ["a. collecting taxes on agricultural production.", "b. bleeding wealth from neighboring territories.", "c. squeezing the peasants.", "d. raising tariffs on all imports.", "e. getting large loans from the World Bank."], "answer": "squeezing the peasants."}, {"id": 107, "question": "Most European nations thought the war that started in 1914 would", "choices": ["a. be won by slow perseverance.", "b. end with little expense.", "c. be long and costly.", "d. be won by the fastest-moving army and the boldest general.", "e. help unite the classes."], "answer": "be won by the fastest-moving army and the boldest general."}, {"id": 108, "question": "Which of the following were challenges Japan faced after World War I?", "choices": ["a. regular typhoons", "b. periodic earthquakes", "c. rapidly rising population", "d. very few natural resources and little arable land", "e. all of the above"], "answer": "all of the above"}, {"id": 109, "question": "What was the mandate system?", "choices": ["a. Colonialism was eliminated.", "b. The League of Nations members divided a percentage of wealth generated by all colonies.", "c. An immigration system of guest workers was designed to supply the former colonizers with inexpensive laborers.", "d. Colonial rulers administered former German and Ottoman territories but were held accountable to the League of Nations.", "e. Colonies were incorporated into various nations with all the rights and liabilities of ordinary citizens."], "answer": "Colonial rulers administered former German and Ottoman territories but were held accountable to the League of Nations."}, {"id": 110, "question": "The policy decision that most affected future relations between the Jewish and Palestinian settlers was embodied in", "choices": ["a. the Dreyfus Affair.", "b. the Doctors' Conspiracy.", "c. the Zimmerman Telegram.", "d. the Balfour Declaration.", "e. the Treaty of Brest Litovsk."], "answer": "the Balfour Declaration."}, {"id": 111, "question": "Nationalism failed to unify which countries in the late nineteenth century?", "choices": ["a. Germany and Italy", "b. Italy and Spain", "c. Spain and Portugal", "d. Britain and France", "e. Russia and Austria-Hungary"], "answer": "Russia and Austria-Hungary"}, {"id": 112, "question": "Japan's plan for imperialism as defined by Yamagata Aritomo was to control a \"sphere of influence\" comprised all of the following except", "choices": ["a. Part of China.", "b. Korea.", "c. all of the above.", "d. Manchuria.", "e. Taiwan."], "answer": "Taiwan."}, {"id": 113, "question": "Late-nineteenth-century Victorian morality dictated that men and women", "choices": ["a. belong in factories.", "b. should be involved in politics.", "c. should be in a competitive relationship.", "d. belong in separate spheres.", "e. belong in comparable social spheres."], "answer": "belong in separate spheres."}, {"id": 114, "question": "The leader of the Guomindang after 1925 was:", "choices": ["a. Mao Tse Tung", "b. Chiang Kai-shek", "c. Yuan Shikai", "d. Emperess Cixi", "e. Sun Yat-sen"], "answer": "Chiang Kai-shek"}, {"id": 115, "question": "Which of the following “smaller” delegations was given consideration in the Versailles talks?", "choices": ["a. The demands of the Italians who had switched sides to the Entente.", "b. The Japanese proposal of racial equality.", "c. The claims for an independent Arabic state by Faisal.", "d. none of these.", "e. W. E. B. Du Bois’ call for resolution of the concerns of African people."], "answer": "none of these."}], "quiz9": [{"id": 1, "question": "What were the reasons for the politics of \"appeasement\"?", "choices": ["a. Fear of war", "b. Fear of communism", "c. All of these", "d. Belief that one's word was as good as a contract, according to Seville Chamberlain", "e. Lack of familiarity with fascist tactics"], "answer": "All of these"}, {"id": 2, "question": "The Battle of Midway proved that the key to victory in the Pacific Ocean was", "choices": ["a. the base at Pearl Harbor.", "b. short supply lines.", "c. aircraft carriers.", "d. holding the Philippine Islands.", "e. the atomic bomb."], "answer": "aircraft carriers."}, {"id": 3, "question": "What did Adolf Hitler write while in jail in the 1920s?", "choices": ["a. Mein Kampf", "b. All Quiet on the Western Front", "c. The Protocols of the Elders of Zion", "d. Das Boot", "e. The Portrait of the Artist as a Young Man"], "answer": "Mein Kampf"}, {"id": 4, "question": "Eventually, Japanese leaders realized that the Sino-Japanese War (1937-1945) with China", "choices": ["a. would be over in a short period of time if they could hold on.", "b. was a drain on Japanese resources.", "c. was too popular at home to make peace.", "d. was morally repugnant.", "e. was self-defeating as they were ethnically similar people."], "answer": "was a drain on Japanese resources."}, {"id": 5, "question": "In 1939, Hitler formed the Axis with Italy and signed a \"secret pact\" with which world power?", "choices": ["a. Japan", "b. Spain", "c. USSR", "d. Yugoslavia", "e. Italy"], "answer": "USSR"}, {"id": 6, "question": "In the early years of World War II, the Soviet Union invaded which of the following countries?", "choices": ["a. France and China", "b. eastern Poland and the Baltic republics", "c. Germany and Japan", "d. Greece and Turkey", "e. Germany and Italy"], "answer": "eastern Poland and the Baltic republics"}, {"id": 7, "question": "The economy of southern African boomed during the Depression because", "choices": ["a. of the abundant supply of slave labor.", "b. the Depression made gold more valuable.", "c. it was exploited as a colony.", "d. it was not part of the world economy.", "e. it was based on agriculture, not industry."], "answer": "the Depression made gold more valuable."}, {"id": 8, "question": "At Nanjing, the Japanese troops raped", "choices": ["a. 1,700 Chinese women.", "b. 800 Chinese women.", "c. 20,000 Chinese women.", "d. 200 Chinese women.", "e. 15,000 Chinese women."], "answer": "20,000 Chinese women."}, {"id": 9, "question": "Mao Zedong's 1934 escape from the Guomindang to Shaanxi was called the", "choices": ["a. March of Madness.", "b. Trek to the Mountain.", "c. Long March.", "d. Miracle of Mao.", "e. Night of Terror."], "answer": "Long March."}, {"id": 10, "question": "The Chinese Communist Party enhanced its prestige by doing which of the following:", "choices": ["a. redistributing lands of the wealthy among the poor peasants.", "b. waging battles against corrupt and alienating GMD forces.", "c. obtaining American weapons taken from the GMD.", "d. all of the above.", "e. obtaining Japanese equipment seized by the Soviets."], "answer": "all of the above."}, {"id": 11, "question": "The main cause of environmental stress during World War II was the", "choices": ["a. tremendous number of refugees.", "b. massive numbers of diseased corpses.", "c. scarring of battlefields by enormous armies.", "d. economic development, which increased demand for raw materials.", "e. bombing of cities into ruins."], "answer": "economic development, which increased demand for raw materials."}, {"id": 12, "question": "Italy's fasci di combattimento demanded action and intimidated politicians in Italy, and they were initially comprised mainly", "choices": ["a. pardoned prisoners.", "b. disgruntled workers and socialists.", "c. radical politicians and hired thugs.", "d. conservative politicians and the military.", "e. unemployed veterans and violent youths."], "answer": "unemployed veterans and violent youths."}, {"id": 13, "question": "Soviet deaths during World War II numbered between ____ million.", "choices": ["a. 10 and 12", "b. 20 and 25", "c. 45 and 50", "d. 2 and 3", "e. 5 and 6"], "answer": "20 and 25"}, {"id": 14, "question": "The Communist Chinese forces defeated the Guomindang largely through", "choices": ["a. a larger army and navy.", "b. the use of smallpox as a biological weapon.", "c. the greed and ineptness of the Guomindang.", "d. a last-minute alliance with Japan.", "e. better training and equipment."], "answer": "the greed and ineptness of the Guomindang."}, {"id": 15, "question": "Stalin's main tool for implementing terror was the", "choices": ["a. NVKD.", "b. SovNarKom.", "c. NEP.", "d. People's Commissar.", "e. KGB."], "answer": "NVKD."}, {"id": 16, "question": "Many Japanese nationalists thought that the answer to the Depression was to", "choices": ["a. make prayers and sacrifices to their ancestors.", "b. have Japan establish a colonial empire.", "c. All of these", "d. once again close Japan to Western influence.", "e. better support Japanese agriculture."], "answer": "have Japan establish a colonial empire."}, {"id": 17, "question": "The German Blitzkrieg meant, literally,", "choices": ["a. death from above.", "b. lightning war.", "c. total war.", "d. secret war.", "e. no surrender."], "answer": "lightning war."}, {"id": 18, "question": "The prime motivation for the Japanese invasion of Southeast Asia was", "choices": ["a. its abundant strategic materials including oil and rubber.", "b. to avenge the execution of Japanese sailors in 1938.", "c. to keep the United States from entering the war.", "d. to keep the Japanese people satisfied.", "e. the opportunity to defeat Western powers."], "answer": "its abundant strategic materials including oil and rubber."}, {"id": 19, "question": "The Germans were unable to overcome the British use of radar and code-breaking in the Battle of Britain, which was conducted primarily by", "choices": ["a. air attacks.", "b. submarines.", "c. ground force invasion on the beaches at Hastings.", "d. naval warships.", "e. detonating a magneto-electric pulse on London to wipe out all electric power."], "answer": "air attacks."}, {"id": 20, "question": "The excuse used by Japan to provoke the Manchurian Incident in 1931 was", "choices": ["a. a riot by the Chinese against Japanese presence.", "b. that the Chinese were allying with Russia, and Japan wanted to prevent a recurrence of the Russo-Japanese War in 1905.", "c. the need to declare a war on drugs against China's opium trade.", "d. that China threatened Japanese imperial holdings in Korea.", "e. an explosion on a railway track."], "answer": "an explosion on a railway track."}, {"id": 21, "question": "Hitler's popularity came in large part from the German people's belief that", "choices": ["a. he was a religious, as well as a political, leader.", "b. economic well-being outweighed a loss of liberty.", "c. he was literally the second coming of Jesus Christ.", "d. All of these.", "e. the German Communist Party should rule Europe."], "answer": "economic well-being outweighed a loss of liberty."}, {"id": 22, "question": "Which of the following were actions taken by Benito Mussolini?", "choices": ["a. He liberalized education.", "b. all of these.", "c. He crushed all other political parties.", "d. He gave employers control over employees.", "e. He put Fascists in government jobs."], "answer": "all of these."}, {"id": 23, "question": "Which of the following scientific and technological innovations were spurred by World War II?", "choices": ["a. Nuclear weapons", "b. All of the above", "c. Antibiotics", "d. Radar", "e. Synthetic rubber"], "answer": "Radar"}, {"id": 24, "question": "Hitler's resumption of offensive tactics in 1940 focused on which area?", "choices": ["a. all of the above", "b. Denmark", "c. Belgium", "d. France", "e. Norway"], "answer": "all of the above"}, {"id": 25, "question": "The German Army would go on the defensive in North Africa after this army prevailed in the Battle of El Alamein.", "choices": ["a. Egyptian", "b. Italian", "c. Moroccan", "d. Arabic", "e. British"], "answer": "British"}, {"id": 26, "question": "Which group was murdered by the Nazis in the interest of \"racial purity\"?", "choices": ["a. Gypsies", "b. All of the above", "c. The disabled and mentally ill", "d. Homosexuals", "e. The Polish elite"], "answer": "All of the above"}, {"id": 27, "question": "Stalin's spectacular purge trials were initiated after which of the following events?", "choices": ["a. the collapse of the trans-Siberian railway.", "b. the politburo discovered a plot by the Mensheviks to assassinate Stalin.", "c. None of these.", "d. the Cheka head was replaced by Lavrenty Beria.", "e. the murder of Sergei Kirov."], "answer": "the murder of Sergei Kirov."}, {"id": 28, "question": "Hitler's first invasion with a newly rearmed Germany in 1938 was in", "choices": ["a. Finland.", "b. Czechoslovakia.", "c. Belgium.", "d. Austria.", "e. Poland."], "answer": "Austria."}, {"id": 29, "question": "On December 7, 1941,", "choices": ["a. the Soviet Union invaded north China.", "b. Japan surrender to the United States to end World War II.", "c. Japanese planes bombed the United States naval base at Pearl Harbor.", "d. the Yalta Conference took place and set in motion the plans for the Axis defeat.", "e. the United States army invaded the home islands of Japan."], "answer": "Japanese planes bombed the United States naval base at Pearl Harbor."}, {"id": 30, "question": "The slogan about Benito Mussolini repeated in fascist Italy was", "choices": ["a. \"Italy for the Italians.\"", "b. \"One Italy, one God, one leader.\"", "c. \"In your heart, you know he's right.\"", "d. \"A Commitment to Excellence. \"", "e. \"Il Duce (the leader) is always right.\""], "answer": "\"Il Duce (the leader) is always right.\""}, {"id": 31, "question": "Why was the winter of 1939-40 termed a period of \"phony war?\"", "choices": ["a. Britain and France declared war on Germany but took no action.", "b. The Soviet Union did not actively fight, but let winter kill off most of their enemies.", "c. The revelation of the Soviet-German pact over Poland was revealed.", "d. The perception was that there was no real war without US involvement.", "e. none of these."], "answer": "Britain and France declared war on Germany but took no action."}, {"id": 32, "question": "The stock market crash of 1929 turned into", "choices": ["a. an economic boon to the \"common man,\" as he was now able to afford stock.", "b. a depression for the United States only.", "c. a \"limited\" depression in some countries, but not most Western countries.", "d. the deepest, most widespread depression in history.", "e. a minor depression followed by an economic recovery."], "answer": "the deepest, most widespread depression in history."}, {"id": 33, "question": "Despite the Stalinist terror, Soviet women", "choices": ["a. found themselves in more repressed roles.", "b. were expected to work only in farm collectives.", "c. gained equality with men.", "d. entered jobs and careers previously closed to them.", "e. found their roles in society unchanged."], "answer": "entered jobs and careers previously closed to them."}, {"id": 34, "question": "China's response to the Depression was", "choices": ["a. to make an alliance with Japan for raw materials in exchange for imported finished goods.", "b. one of the worst in the non-industrialized world", "c. negligible, as their economy was growing under the auspices of Communism.", "d. very little, as their problems were more political than economic.", "e. to start a revolution for modernization."], "answer": "very little, as their problems were more political than economic."}, {"id": 35, "question": "The Soviet Union paid for the First Five-Year Plan by", "choices": ["a. squeezing the peasants through collectivization.", "b. using revenue from the colonies.", "c. seizing neighboring territories.", "d. borrowing heavily from Western nations.", "e. creating a new middle class."], "answer": "squeezing the peasants through collectivization."}, {"id": 36, "question": "The start of the final Allied push to end the war in Europe began on June 6, 1944, forever after known as", "choices": ["a. Battle of the Bulge.", "b. The Big One.", "c. D-Day.", "d. Operation Caprica.", "e. The Norman Invasion."], "answer": "D-Day."}, {"id": 37, "question": "Franklin D. Roosevelt's economic recovery plan was called the", "choices": ["a. Trickle Down Economics.", "b. New Frontier.", "c. Square Deal.", "d. Fair Deal.", "e. New Deal."], "answer": "New Deal."}, {"id": 38, "question": "The Purges were a series of trials based on the opportunity to do which of the following", "choices": ["a. Stalin's desire to remove old supporters of Lenin from the Party.", "b. prepare the population for a dictatorship of the proletariat.", "c. all of these.", "d. the plan to remove Red Army officers suspected of treason.", "e. spread the terror to the lower levels of the population."], "answer": "all of these."}, {"id": 39, "question": "Hitler's idea of a \"master race\" did not include which group?", "choices": ["a. Eastern European Slavs.", "b. All of these.", "c. Alpine Italians.", "d. Russians.", "e. Jews."], "answer": "All of these."}, {"id": 40, "question": "One of the most significant long-lasting consequences of World War II in the United States was the", "choices": ["a. extension of mandatory retirement until age sixty-five.", "b. end of any German military threat.", "c. recruitment of women and minorities into the labor force.", "d. loss of the U.S. Pacific colonies.", "e. encouragement of racial discrimination."], "answer": "recruitment of women and minorities into the labor force."}, {"id": 41, "question": "In 1935, Mussolini took advantage of the weakness of the Western democracies and", "choices": ["a. sent military aid to Germany.", "b. annexed Sicily.", "c. launched a bombing campaign against France.", "d. invaded Ethiopia.", "e. ended diplomatic relations with Britain."], "answer": "invaded Ethiopia."}, {"id": 42, "question": "One of the most outspoken feminists of the Bolshevik Party was", "choices": ["a. Tatiana Romanova", "b. Anna Akhmatova", "c. Rosa Luxemburg", "d. Irina Krupskaia", "e. Alexandra Kollontai"], "answer": "Alexandra Kollontai"}, {"id": 43, "question": "The Smoot-Hawley tariff of 1930 was", "choices": ["a. a means to supply the USSR with machines for the Lend-Lease program.", "b. an economic embargo imposed by the European Allies against German imports in retaliation for suspension of reparations payments.", "c. a tax on raw materials for industrialization.", "d. a plan to tax participants in the League of Nations to pay for rebuilding the European economy.", "e. a protective tariff on imported goods applied by the United States to stimulate the domestic economy."], "answer": "a protective tariff on imported goods applied by the United States to stimulate the domestic economy."}, {"id": 44, "question": "How did the Nazi takeover of Germany affect Stalin's second Five-Year Plan?", "choices": ["a. It provided Stalin with a new trading partner who also was a militarist.", "b. It did not change his plan.", "c. The Nazis demanded that Stalin cancel his second Five-Year Plan.", "d. Stalin intended to produce arms but decided to produce consumer goods instead.", "e. Stalin intended to produce consumer goods but decided to produce arms instead."], "answer": "Stalin intended to produce consumer goods but decided to produce arms instead."}, {"id": 45, "question": "Hitler's goal for Germany included which of the following", "choices": ["a. to expand into Poland.", "b. to take over all German-speaking territory.", "c. all of these.", "d. the repeal of the Treaty of Versailles.", "e. to eliminate the Jews from Europe."], "answer": "all of these."}, {"id": 46, "question": "Per his earlier writings in Mein Kampf, Hitler's plan for Russia was", "choices": ["a. to enslave the Slavic people and create \"living space\" to the East.", "b. to take over the fertile agricultural lands of western Russia.", "c. to work in cooperation with Stalin to execute all Jews.", "d. complete genocide of all Bolsheviks.", "e. to install Catholicism in place of the Russian Orthodox Church."], "answer": "to enslave the Slavic people and create \"living space\" to the East."}, {"id": 47, "question": "Which of the following were among Mao Zedong's policies toward women?", "choices": ["a. He encouraged women to organize.", "b. He banned arranged marriage.", "c. He banned footbinding.", "d. He allowed divorce.", "e. All of the above."], "answer": "All of the above."}, {"id": 48, "question": "Mao Zedong's variety of communism was a radical departure from the traditional ideology because it", "choices": ["a. was the same as Stalin's brand of communism.", "b. emphasized the urban proletariat.", "c. relied on the peasantry.", "d. only accepted individuals under twelve years old so they could be properly indoctrinated.", "e. involved no land distribution."], "answer": "relied on the peasantry."}, {"id": 49, "question": "Which of the following was a result of increased United States production during World War II?", "choices": ["a. It ended the Depression and unemployment.", "b. It created a post-World War II consumer boom.", "c. It helped improve nutrition in the United States.", "d. All of the above.", "e. It was double that of all the Axis nations."], "answer": "All of the above."}, {"id": 50, "question": "The final defeat of Japan took longer than victory over Germany in large part because", "choices": ["a. ice floes surrounded the islands of Japan.", "b. the United States had concentrated its efforts on Germany.", "c. the Japanese had captured so much more territory.", "d. the Allies were unsure of whether to use the atomic bomb.", "e. of fanatical Japanese resistance."], "answer": "the United States had concentrated its efforts on Germany."}, {"id": 51, "question": "At the height of the Stalinist terror of the 1930s", "choices": ["a. the USSR joined forces with Germany and Italy to invade Poland.", "b. Stalin was killed in a Kremlin coup.", "c. millions of Jews were slaughtered in gas chambers.", "d. approximately one million citizens died a year in the gulags.", "e. Moscow was burnt to the ground as part of Stalin's \"scorched earth\" policy."], "answer": "approximately one million citizens died a year in the gulags."}, {"id": 52, "question": "The Holocaust is estimated to have killed ____ Jews.", "choices": ["a. 1 million", "b. 10 million", "c. 6 million", "d. 3 million", "e. 500,000"], "answer": "6 million"}, {"id": 53, "question": "One of the fiercest battles on the Volga River between USSR and Germany, and a key turning point in the war, was at", "choices": ["a. Moscow.", "b. Stalingrad.", "c. Riga.", "d. Lvov.", "e. Odessa."], "answer": "Stalingrad."}, {"id": 54, "question": "The end of the war in the Pacific arena was hastened by", "choices": ["a. the economic devastation that would occur to the rest of Japan.", "b. the environmental effects of radioactivity.", "c. the U.S. use of atomic bombs on Hiroshima and Nagasaki.", "d. international objection to the slaughter of civilian populations.", "e. the refusal of the United States to consider any alternatives."], "answer": "the U.S. use of atomic bombs on Hiroshima and Nagasaki."}, {"id": 55, "question": "Stalin's First Five-Year Plan stressed", "choices": ["a. participation in the European Union.", "b. acquiring colonies to protect the Soviet economy.", "c. decentralized control and economic incentives.", "d. production of consumer goods for export.", "e. increases in electricity and heavy industries."], "answer": "increases in electricity and heavy industries."}, {"id": 56, "question": "Why was Chiang Kai-shek less focused on building up the Chinese military for fighting the Japanese after escaping to Sichuan?", "choices": ["a. He was preparing for a future battle with Mao's Communist army.", "b. He planned to form an alliance with Russia and knew it would require a troop commitment.", "c. He needed troops to rebuild the infrastructure after he had destroyed the dikes of the Yellow River.", "d. He had already lost significant troops in Beijing.", "e. He knew that war with Japan was going to be very drawn out."], "answer": "He was preparing for a future battle with Mao's Communist army."}], "quiz10": [{"id": 1, "question": "South African governments used policies of racial segregation called", "choices": ["a. blitzkrieg.", "b. apartheid", "c. volkgeist", "d. secession", "e. partition"], "answer": "apartheid"}, {"id": 2, "question": "Decolonization was", "choices": ["a. limited to South Africa", "b. largely complete before the onset of World War II", "c. the root cause of war in El Salvador", "d. the political ideology of the East versus the West", "e. often shaped by the need to align with either the United States or the Soviet Union"], "answer": "often shaped by the need to align with either the United States or the Soviet Union"}, {"id": 3, "question": "Which leader of the African National Congress organized guerrilla resistance in 1960 against South African apartheid?", "choices": ["a. Kwame Nkrumah", "b. Nelson Mandela", "c. Leopold Senghor", "d. Jomo Kenyatta", "e. Patrice Lamumba"], "answer": "Nelson Mandela"}, {"id": 4, "question": "Steve Biko was", "choices": ["a. elected as president of the new Republic of Zimbabwe", "b. Prime Minister of the apartheid government in South Africa", "c. an Anglican bishop within South Africa who won the Nobel Peace Prize", "d. one of the founders of the Black Consciousness Movement", "e. a radical within the African National Congress"], "answer": "one of the founders of the Black Consciousness Movement"}, {"id": 5, "question": "The Soviet-dominated counterpart to NATO, which included countries of eastern Europe, was the", "choices": ["a. Bretton Woods Collective", "b. Green Revolution", "c. Détente agreements", "d. Helsinki Accords", "e. Warsaw Pact"], "answer": "Warsaw Pact"}, {"id": 6, "question": "The Marshall Plan", "choices": ["a. had helped to rebuild Japan", "b. was used currency reserves from member nations to finance temporary trade deficits", "c. had provided 20 billion dollars in economic aid to friendly European countries by 1961", "d. was never enacted due to partisan political feuds in Congress", "e. had launched a process of economic cooperation and integration"], "answer": "had provided 20 billion dollars in economic aid to friendly European countries by 1961"}, {"id": 7, "question": "Most of the leaders of African independence movements were:", "choices": ["a. among the most westernized members of their society", "b. influenced by the Soviet economic model", "c. pro Communist.", "d. oppressed by imperial European governments", "e. committed to imparting democracy"], "answer": "among the most westernized members of their society"}, {"id": 8, "question": "Restrictions on U.S. military operations during the Vietnam War aimed to prevent China from entering the war and", "choices": ["a. win the sympathy of the North Vietnamese leaders", "b. limit civilian casualties", "c. appease American antiwar activists", "d. kept the U.S. from winning the war", "e. keep the Soviet army from entering the war"], "answer": "kept the U.S. from winning the war"}, {"id": 9, "question": "What event was the catalyst for the space race?", "choices": ["a. The United States landing of a man on the moon", "b. The crash of the Apollo 11", "c. The Soviet Sputnik satellite launch", "d. The successful Soviet flight of a man around the earth", "e. The U-2 incident of 1960"], "answer": "The Soviet Sputnik satellite launch"}, {"id": 10, "question": "The US overthrew the Guatemalan government in 1954, employing for the first time operatives of the CIA, because", "choices": ["a. it failed to pay the army regularly", "b. of repeated strikes by trade unionists", "c. it was harboring kidnappers of American missionaries", "d. it mistreated agricultural workers", "e. it threatened to seize large agricultural estates owned by the United Fruit Company"], "answer": "it threatened to seize large agricultural estates owned by the United Fruit Company"}, {"id": 11, "question": "How did the USSR violate the Bretton Woods Conference agreement of 1946 to participate in the World Bank?", "choices": ["a. By refusing to participate in the Marshall Plan", "b. By invading Hungary in 1956", "c. By insisting that Communism would overthrow the propertied classes", "d. By instituting a closed monetary system for itself and allied communist countries in Eastern Europe", "e. By participating in a grain embargo against China"], "answer": "By instituting a closed monetary system for itself and allied communist countries in Eastern Europe"}, {"id": 12, "question": "The North Atlantic Treaty Organization (NATO), established in 1949, was a", "choices": ["a. military alliance of the recently defeated countries of World War II", "b. military alliance of newly freed African countries", "c. military alliance consisting of the USSR and eastern European countries", "d. military alliance consisting of the United States and western European countries", "e. military compact among the nonaligned states"], "answer": "military alliance consisting of the United States and western European countries"}, {"id": 13, "question": "One of the triumphs of the Green Revolution was:", "choices": ["a. the development of \"miracle rice\"", "b. mandating cleanup of toxic waste in third world countries abused by the Industrial Nations", "c. Khrushchev's success in the Virgin Lands Campaign", "d. raising public awareness of ecology and recycling in the 1960s", "e. construction of the Aswan Dam in Egypt"], "answer": "the development of \"miracle rice\""}, {"id": 14, "question": "Mao Zedong's 1958 Great Leap Forward was intended to propel China into a world industrial power and was designed", "choices": ["a. to build an alliance with the Soviet Union", "b. to industrialize using small-scale industries and collectivized agriculture", "c. to put a man into space", "d. to isolate China from foreign influences", "e. to build modern Western-style factories"], "answer": "to industrialize using small-scale industries and collectivized agriculture"}, {"id": 15, "question": "The Korean War, 1950-1953, was limited to the Korean peninsula because", "choices": ["a. the United States feared that attacking China might prompt Soviet retaliation", "b. of the inaccessibility of its location", "c. military technology had stagnated", "d. neither side could win a decisive victory", "e. geographic conditions favored a defensive war"], "answer": "the United States feared that attacking China might prompt Soviet retaliation"}, {"id": 16, "question": "The discovery by the United States that the Soviet Union had deployed nuclear missiles in Cuba in 1962 sparked", "choices": ["a. the Cuban missile crisis", "b. rebellion in Czechoslovakia", "c. the Bay of Pigs invasion", "d. United States deployment of nuclear missiles in Turkey", "e. the blockade of the Soviet Union"], "answer": "the Cuban missile crisis"}, {"id": 17, "question": "The first British colony in West Africa to gain independence was", "choices": ["a. Rhodesia", "b. Guinea", "c. Ghana", "d. Nigeria", "e. Egypt"], "answer": "Ghana"}, {"id": 18, "question": "15. President Johnson's reform agenda, committed to social reforms and civil rights initiatives, was called the", "choices": ["a. Square Deal", "b. Great Society", "c. New Frontier", "d. Peace Corps", "e. New Deal"], "answer": "Great Society"}, {"id": 19, "question": "Who were the Viet Cong?", "choices": ["a. Chinese military advisors to the North Vietnamese", "b. Neutral Vietnamese who wanted decolonization", "c. A North Vietnamese supported communist guerilla movement", "d. CIA sponsored freedom troops for South Vietnam", "e. Westernized, pro-French South Vietnamese middle classes"], "answer": "A North Vietnamese supported communist guerilla movement"}, {"id": 20, "question": "Why were Greece and Turkey admitted to NATO in 1947?", "choices": ["a. to check Soviet expansion in Europe", "b. To reward their resistance movements against the Axis powers during WW II", "c. They were felt to be capable of participating in the EEC", "d. They were democratic republics with constitutions and met the NATO criteria", "e. They provided missile bases to Western military forces"], "answer": "to check Soviet expansion in Europe"}, {"id": 21, "question": "In the wake of World War II, the model of economic recovery in the west emphasized", "choices": ["a. redevelopment of transportation infrastructures in the wake of wartime destruction", "b. hoarding of resources from Communist countries", "c. a military industrial complex", "d. the production of consumer goods", "e. restructuring of the labor system"], "answer": "the production of consumer goods"}, {"id": 22, "question": "Bangladesh emerged as an independent nation in 1971 from", "choices": ["a. English Burma", "b. Pakistan", "c. Tamir India", "d. French Indochina", "e. Sri Lanka"], "answer": "Pakistan"}, {"id": 23, "question": "The first humans to ever walk on the moon were:", "choices": ["a. Michael Collins and James Lovell", "b. Sergei Korolov and Yuri Gagarin", "c. Chuck Yeager and Sally Ride", "d. Buzz Aldrin and Neil Armstrong", "e. Vladimir Komarov and Alexei Leonov"], "answer": "Buzz Aldrin and Neil Armstrong"}, {"id": 24, "question": "Ho Chi Minh cooperated with the United States during World War II, but soon after the war he inspired", "choices": ["a. nationalist movements in Vietnam against China", "b. the building of the Contra regime in Hanoi", "c. a treaty between North and South Korea", "d. a nationalist coalition against the French", "e. students to go to Europe and study Marxism"], "answer": "a nationalist coalition against the French"}, {"id": 25, "question": "Third World nations were", "choices": ["a. unwilling to flirt with either the US or the USSR", "b. all in the Northern Hemisphere", "c. mostly in Latin America", "d. ignored by the Soviet Union", "e. usually newly independent, poor nations"], "answer": "usually newly independent, poor nations"}, {"id": 26, "question": "In 1956, 25 percent of Cuban national income was derived from", "choices": ["a. sugar manufacture and export", "b. casinos and tourism", "c. United States foreign aid", "d. tin and nickel mining", "e. the United Fruit Company"], "answer": "sugar manufacture and export"}], "quiz11": [{"id": 1, "question": "As Western economies recovered from World War II, most", "choices": ["a. people wanted to stop government spending on the production of weapons.", "b. industries resisted applying new technologies.", "c. consumers sought new goods to purchase.", "d. governments insisted on balanced budget amendments.", "e. new technologies increased labor requirements."], "answer": "consumers sought new goods to purchase."}, {"id": 2, "question": "Crucial to the success of the Japanese economy in the 1970s and 1980s was:", "choices": ["a. tariffs and import regulations restricting foreign competition.", "b. achieving trade relations with China.", "c. participation in the European Common Market.", "d. speculation in American real estate.", "e. breaking up the zaibatsu."], "answer": "tariffs and import regulations restricting foreign competition."}, {"id": 3, "question": "What powerful force ultimately caused the USSR to dissolve?", "choices": ["a. Capitalism", "b. Nationalism", "c. Pacifism", "d. Racism", "e. Mercantilism"], "answer": "Nationalism"}, {"id": 4, "question": "87 percent of the people infected with HIV live in", "choices": ["a. all of these", "b. Latin America.", "c. Asia.", "d. the Caribbean.", "e. Africa."], "answer": "all of these"}, {"id": 5, "question": "Which is most true of the communist states by the 1980s and 1990s?", "choices": ["a. They were uniform in character.", "b. Deep divisions had appeared among communist states.", "c. The collapse of the Soviet Union and Warsaw Pact states was widely foreseen and predicted in the 1980s.", "d. They had never engaged in an armed conflict with another communist state.", "e. They were subservient to the USSR."], "answer": "Deep divisions had appeared among communist states."}, {"id": 6, "question": "Which of the following is not one of the Asian Tigers?", "choices": ["a. South Korea", "b. Singapore", "c. Hong Kong", "d. Taiwan", "e. India"], "answer": "India"}, {"id": 7, "question": "World population between 1950-1985", "choices": ["a. increased by 100%", "b. decreased by 20%", "c. increased 400%", "d. increased by 25%", "e. increased by 50%"], "answer": "increased by 100%"}, {"id": 8, "question": "By the 1960s, developed countries decreased the rate of mortality and had made the demographic transition toward", "choices": ["a. decreased life expectancy.", "b. rapid population growth.", "c. embraced euthanasia.", "d. lowered fertility rates.", "e. increased mortality rates."], "answer": "lowered fertility rates."}, {"id": 9, "question": "The Dirty War fought between the military and leftist groups was in", "choices": ["a. Nicaragua.", "b. Argentina.", "c. Chile.", "d. Panama.", "e. Brazil."], "answer": "Argentina."}, {"id": 10, "question": "Ayatollah Ruhollah Khomeini led an Iranian revolt in 1979 against the former shah and then implemented", "choices": ["a. a communist regime.", "b. persecution of all non-Shi ites.", "c. a nationalization of the oil industry, gaining the enmity of the UAE and OPEC participants.", "d. a parliamentary republic with strict control by religious officials.", "e. a pro-American (but anti-Carter) policy."], "answer": "a parliamentary republic with strict control by religious officials."}, {"id": 11, "question": "The primary agent of technological change in the twentieth century is the", "choices": ["a. small businessman.", "b. university.", "c. research laboratory.", "d. transnational corporation.", "e. government."], "answer": "transnational corporation."}, {"id": 12, "question": "Following the fall of the Berlin Wall, East Germany was united with West Germany in", "choices": ["a. 1985.", "b. 1990.", "c. 1998.", "d. 1975.", "e. 1980."], "answer": "1990."}, {"id": 13, "question": "The policy of restructuring called perestroika in the Soviet Union was authorized by", "choices": ["a. Mikhail Gorbachev.", "b. Boris Yeltsin.", "c. None of these.", "d. Josef Stalin.", "e. Leonid Breshnev."], "answer": "Mikhail Gorbachev."}, {"id": 14, "question": "The playwright who was elected president of Czechoslovakia in 1990 was", "choices": ["a. Andrei Sakharov.", "b. Vaclav Havel.", "c. Nicolae Ceausescu.", "d. Lech Walesa.", "e. Petr Andropov."], "answer": "Vaclav Havel."}, {"id": 15, "question": "One of the reasons for the outbreak of the Iran-Iraq war was", "choices": ["a. Saddam Husain s desire to spark an Islamic revolution in Iran.", "b. Saddam Husain's fear that the revolutionary government of Iran would incite Iraq's Shi'ites to rebellion.", "c. regional instability as a result of the Soviet invasion of Afghanistan.", "d. US pressure on Iraq to invade Iran.", "e. Khomeini s desire to gain control of Iraq s oil industry."], "answer": "Saddam Husain's fear that the revolutionary government of Iran would incite Iraq's Shi'ites to rebellion."}, {"id": 16, "question": "Neo-liberalism in Latin America eroded due to", "choices": ["a. political scandals and a slowing world economy.", "b. shifting the emphasis of the economy in Latin America to cash crops.", "c. deregulation of the oil industry.", "d. free democratic reform elections in Latin America after deposing the dictatorships such as Pinochet s.", "e. an emphasis on central control of the economy by the state."], "answer": "political scandals and a slowing world economy."}, {"id": 17, "question": "Which United States president worked to reestablish Panamanian sovereignty over the U.S. built and controlled Canal Zone?", "choices": ["a. Jimmy Carter", "b. Ronald Reagan", "c. George Bush", "d. Gerald Ford", "e. Bill Clinton"], "answer": "Jimmy Carter"}, {"id": 18, "question": "The most influential technology of the last four decades has been", "choices": ["a. the computer.", "b. industrial robots.", "c. jet airplane transportation.", "d. the combustion engine.", "e. nuclear energy."], "answer": "the computer."}, {"id": 19, "question": "In 1798, Thomas Malthus argued that in China", "choices": ["a. a healthy economy would reduce the population.", "b. population growth would promote economic gains.", "c. a poor economy would drive people back to the land.", "d. population growth would outstrip food production.", "e. maximum population growth is part of God s beneficial design."], "answer": "population growth would outstrip food production."}, {"id": 20, "question": "Which of the following is generally associated with the low birthrates of older industrial nations?", "choices": ["a. Access to contraception and abortion.", "b. Modern consumer culture.", "c. All of these.", "d. Higher levels of women s employment and education.", "e. Women deferring marriage and children until they have established careers."], "answer": "All of these."}, {"id": 21, "question": "The Brazilian Solution refers to", "choices": ["a. a chemical spray used to destroy the rain forest.", "b. the development of a defense against nuclear attack.", "c. the combination of dictatorship, repression, and government promotion of industrialization.", "d. Amerindian genocide.", "e. the rapid population expansion in Latin American nations."], "answer": "the combination of dictatorship, repression, and government promotion of industrialization."}, {"id": 22, "question": "NATO forces were dispatched to the Balkans and used air strikes against Serbia to stop ethnic cleansing in:", "choices": ["a. Montenegro", "b. Kosovo", "c. Bosnia-Herzegovina", "d. Albania", "e. Croatia"], "answer": "Kosovo"}, {"id": 23, "question": "As a response to the protests that culminated in hundreds of thousands protesting in Tiananmen Square, the Chinese government", "choices": ["a. attacked Japanese naval bases in Samoa.", "b. asked the United Nations to bring in peacekeepers.", "c. accepted reforms.", "d. used force, killing hundreds and arresting thousands.", "e. disbanded the Communist government and allowed free elections."], "answer": "used force, killing hundreds and arresting thousands."}, {"id": 24, "question": "Which country was engaged in an unwinnable war with Afghanistan in the 1980s?", "choices": ["a. The United States", "b. The USSR", "c. Iraq", "d. France", "e. Iran"], "answer": "The USSR"}, {"id": 25, "question": "In order to finance arms to Iran to secure the release of American hostages in Lebanon, President Ronald Reagan illicitly sold arms to the Contras and financed the war against the:", "choices": ["a. Sandinistas.", "b. Afghan rebels.", "c. Juan Peron.", "d. Salvadore Allende.", "e. Cubans."], "answer": "Sandinistas."}, {"id": 26, "question": "Solidarity was", "choices": ["a. supported by the Catholic Church in Poland.", "b. all of these.", "c. a union that caused the Polish government to impose martial law.", "d. a potent force with nationally recognized leaders.", "e. a labor union of Polish shipyard workers."], "answer": "all of these."}, {"id": 27, "question": "The keiretsu were", "choices": ["a. philosopher-industrialists.", "b. a consortium of business networks in telecommunications.", "c. Japanese new money men.", "d. an alliance of corporations and banks that ruled the Japanese economy.", "e. a neo-liberal business conglomerate in the Japanese auto industry."], "answer": "an alliance of corporations and banks that ruled the Japanese economy."}, {"id": 28, "question": "The Contras were", "choices": ["a. Nicaraguan revolutionaries who supported the Sandinistas.", "b. counter-revolutionaries financed by the Reagan administration to oppose the leftist Sandinistas.", "c. Cuban terrorists organized by Castro to avenge the Bay of Pigs.", "d. the group of United States congressional opponents to the Reagan policy in South America.", "e. El Salvadoran revolutionaries."], "answer": "counter-revolutionaries financed by the Reagan administration to oppose the leftist Sandinistas."}, {"id": 29, "question": "The Soviet Union was dissolved in", "choices": ["a. 1991.", "b. 1985.", "c. 1994.", "d. None of these", "e. 1979."], "answer": "1991."}, {"id": 30, "question": "Salvador Allende sought to implement socialist reforms in what country?", "choices": ["a. Chile", "b. Argentina", "c. Belize", "d. Costa Rica", "e. Brazil"], "answer": "Chile"}, {"id": 31, "question": "Ethnic cleansing in the Balkans occurred between", "choices": ["a. Christian Serbians and Muslims.", "b. Russians and Croatians.", "c. Greeks and Serbians.", "d. Albanians and Armenians.", "e. Serbians and Ottomans."], "answer": "Christian Serbians and Muslims."}, {"id": 32, "question": "Which of the following factors have contributed to the declining life expectancy in eastern Europe?", "choices": ["a. low incomes", "b. food shortages", "c. all of these", "d. decreased social", "e. unemployment"], "answer": "all of these"}, {"id": 33, "question": "Dirty war was so deemed because it was characterized by", "choices": ["a. torture and executions by the military.", "b. the use of long-lasting radioactive weapons.", "c. a peasant movement against the wealthy landowners.", "d. leftist propaganda during the Cold War", "e. tremendous deforestation and stripping of natural resources."], "answer": "torture and executions by the military."}, {"id": 34, "question": "Muhammad Reza Pahlavi, the The Shah of Iran, was supported strongly by", "choices": ["a. Amnesty International.", "b. secular reformers and industrialists.", "c. None of these", "d. the religious factions of Iran.", "e. the United States."], "answer": "the United States."}, {"id": 35, "question": "In 1994, genocide was perpetrated by", "choices": ["a. South African minorities against blacks.", "b. Rwandan Hutus against Tutsis.", "c. Egyptian Christians against Muslims.", "d. Muslim Nigerians against Christians.", "e. Sudanese Arabs against the people of Darfur."], "answer": "Rwandan Hutus against Tutsis."}, {"id": 36, "question": "After the fall of the Soviet Union, a morass of separatism and warring and ethnic and religious groups undermined the Balkan nation of", "choices": ["a. Greece.", "b. Bulgaria.", "c. Estonia.", "d. Czechoslovakia.", "e. Yugoslavia."], "answer": "Yugoslavia."}, {"id": 37, "question": "The first Latin American nation to experience conservative reaction to the Cuban revolution by the army overthrowing their constitutional government in 1964 wa
