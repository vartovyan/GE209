const CHAPTER_NAMES = {
  quiz1:  "Quiz 1 — Early Civilizations",
  quiz2:  "Quiz 2 — Bronze Age & Israel",
  quiz3:  "Quiz 3 — Rome & Han China",
  quiz4:  "Quiz 4 — Silk Road & Africa",
  quiz5:  "Quiz 5 — Islam & Mongols",
  quiz6:  "Quiz 6 — Medieval Europe",
  quiz7:  "Quiz 7 — Renaissance & Exploration",
  quiz8:  "Quiz 8 — Revolutions & Industry",
  quiz9:  "Quiz 9 — Imperialism & WWI",
  quiz10: "Quiz 10 — WWII & Cold War",
  quiz11: "Quiz 11 — Decolonization",
  quiz12: "Quiz 12 — Globalization",
};

const MIDTERM_KEYS = ["quiz1","quiz2","quiz3","quiz4","quiz5"];
const FINAL_KEYS = ["quiz6","quiz7","quiz8","quiz9","quiz10","quiz11","quiz12"];
const ALL_KEYS = [...MIDTERM_KEYS, ...FINAL_KEYS];

// ══════════════════════════════════════════════════════════════════════
// STATE
// ══════════════════════════════════════════════════════════════════════
let state = loadState();
let currentMode = null;
let currentPool = [];
let currentQ = null;
let answered = false;
let sessionCorrect = 0;
let sessionTotal = 0;
let batchCorrect = 0;
let batchTotal = 0;

function freshState() {
  return {
    weights: {},
    seen: {},
    correct: {},
    streak: 0,
    bestStreak: 0,
    totalAnswered: 0,
    totalCorrect: 0,
  };
}
function loadState() {
  try {
    const s = JSON.parse(localStorage.getItem("quizzer_state"));
    if (s && s.weights) return s;
  } catch {}
  return freshState();
}
function saveState() { localStorage.setItem("quizzer_state", JSON.stringify(state)); }

// ══════════════════════════════════════════════════════════════════════
// SPACED REPETITION
// ══════════════════════════════════════════════════════════════════════
function getWeight(key) { return state.weights[key] ?? 1; }

function weightedPick(pool) {
  const weights = pool.map(q => getWeight(q._srcChapter + ":" + q.id));
  const total = weights.reduce((a, b) => a + b, 0);
  let r = Math.random() * total;
  for (let i = 0; i < pool.length; i++) {
    r -= weights[i];
    if (r <= 0) return pool[i];
  }
  return pool[pool.length - 1];
}

function updateWeight(key, correct) {
  const w = getWeight(key);
  if (correct) {
    state.weights[key] = Math.max(0.05, w * 0.6);
    state.streak++;
    if (state.streak > state.bestStreak) state.bestStreak = state.streak;
    state.totalCorrect++;
  } else {
    state.weights[key] = Math.min(20, w * 3);
    state.streak = 0;
  }
  state.seen[key] = (state.seen[key] || 0) + 1;
  if (correct) state.correct[key] = (state.correct[key] || 0) + 1;
  state.totalAnswered++;
  saveState();
}

// ══════════════════════════════════════════════════════════════════════
// HELPERS
// ══════════════════════════════════════════════════════════════════════
function getMasteryInfo(keys) {
  let total = 0, mastered = 0;
  keys.forEach(k => {
    const qs = QUIZ_DATA[k];
    total += qs.length;
    mastered += qs.filter(q => getWeight(k + ":" + q.id) < 0.6).length;
  });
  return { total, mastered, pct: total ? Math.round(mastered / total * 100) : 0 };
}

function makeQuizCard(key, extraClass) {
  const qs = QUIZ_DATA[key];
  const m = qs.filter(q => getWeight(key + ":" + q.id) < 0.6).length;
  const pct = qs.length ? Math.round(m / qs.length * 100) : 0;
  const num = key.replace("quiz", "");
  const card = document.createElement("div");
  card.className = "quiz-card glass" + (extraClass ? " " + extraClass : "");
  card.onclick = () => startQuiz(key);
  card.innerHTML = `
    <div class="card-num">Chapter ${num}</div>
    <div class="card-title">${(CHAPTER_NAMES[key].split("—")[1] || "").trim()}</div>
    <div class="card-sub">${qs.length} questions</div>
    <div class="card-mastery">
      ✅ ${m}/${qs.length} Mastered
      <div class="mastery-bar"><div class="mastery-bar-fill" style="width:${pct}%"></div></div>
    </div>
  `;
  return card;
}

function makeAllCard(mode, keys, label, extraClass, accentColor) {
  const info = getMasteryInfo(keys);
  const card = document.createElement("div");
  card.className = "quiz-card glass " + extraClass;
  card.onclick = () => startQuiz(mode);
  card.innerHTML = `
    <div class="card-num">${label}</div>
    <div class="card-title">Combined Review</div>
    <div class="card-sub">${info.total} questions</div>
    <div class="card-mastery">
      ✅ ${info.mastered}/${info.total} Mastered
      <div class="mastery-bar"><div class="mastery-bar-fill" style="width:${info.pct}%"></div></div>
    </div>
  `;
  return card;
}

// ══════════════════════════════════════════════════════════════════════
// HOME SCREEN
// ══════════════════════════════════════════════════════════════════════
function renderHome() {
  // Midterm grid
  const mg = document.getElementById("midterm-grid");
  mg.innerHTML = "";
  MIDTERM_KEYS.forEach(k => mg.appendChild(makeQuizCard(k)));
  mg.appendChild(makeAllCard("all-midterm", MIDTERM_KEYS, "All Midterm", "all-midterm"));

  // Final grid
  const fg = document.getElementById("final-grid");
  fg.innerHTML = "";
  FINAL_KEYS.forEach(k => fg.appendChild(makeQuizCard(k)));
  fg.appendChild(makeAllCard("all-final", FINAL_KEYS, "All Final", "all-final"));
}

// ══════════════════════════════════════════════════════════════════════
// QUIZ ENGINE
// ══════════════════════════════════════════════════════════════════════
function startQuiz(mode) {
  currentMode = mode;
  sessionCorrect = 0;
  sessionTotal = 0;
  batchCorrect = 0;
  batchTotal = 0;

  let keys;
  if (mode === "all-midterm") keys = MIDTERM_KEYS;
  else if (mode === "all-final") keys = FINAL_KEYS;
  else keys = [mode];

  currentPool = [];
  keys.forEach(k => {
    QUIZ_DATA[k].forEach(q => {
      currentPool.push({ ...q, _srcChapter: k });
    });
  });

  document.getElementById("home-screen").style.display = "none";
  const qs = document.getElementById("quiz-screen");
  qs.style.display = "block";
  qs.style.animation = "none";
  qs.offsetHeight;
  qs.style.animation = "fadeUp .4s ease";

  let title;
  if (mode === "all-midterm") title = "All Midterm (1–5)";
  else if (mode === "all-final") title = "All Final (6–12)";
  else title = CHAPTER_NAMES[mode];
  document.getElementById("quiz-title").textContent = title;

  updateStreakBadge();
  showQuestion();
}

function showQuestion() {
  answered = false;
  document.getElementById("question-area").style.display = "block";
  document.getElementById("session-summary").style.display = "none";

  currentQ = weightedPick(currentPool);
  const key = currentQ._srcChapter + ":" + currentQ.id;

  // Progress
  const totalInPool = currentPool.length;
  const seenInPool = currentPool.filter(q =>
    state.seen[q._srcChapter + ":" + q.id]
  ).length;
  const pct = totalInPool ? Math.round(seenInPool / totalInPool * 100) : 0;
  document.getElementById("progress-fill").style.width = pct + "%";

  // First-seen detection
  const isFirstSeen = !state.seen[key];

  // Counter
  const weight = getWeight(key);
  let badge = "";
  if (isFirstSeen) badge = " · <span style='color:#fbbf24'>📖 First Time</span>";
  else if (weight < 0.6) badge = " · <span style='color:var(--correct)'>✅ Mastered</span>";
  else if (weight > 2) badge = " · <span style='color:var(--wrong)'>⚠ Needs Review</span>";
  document.getElementById("q-counter").innerHTML =
    `Question ${sessionTotal + 1} · Seen ${state.seen[key] || 0}× · Weight ${weight.toFixed(1)}${badge}`;

  // Question text
  document.getElementById("q-text").textContent = currentQ.question;

  // Shuffle choices
  const normalize = s => s.replace(/^[a-e]\.\s*/, "").trim().toLowerCase().replace(/[.\s]+$/, "");
  const shuffled = [...currentQ.choices].sort(() => Math.random() - 0.5);
  const choicesEl = document.getElementById("choices");
  choicesEl.innerHTML = "";

  // First-seen banner
  const existingBanner = document.querySelector(".first-seen-banner");
  if (existingBanner) existingBanner.remove();
  if (isFirstSeen) {
    const banner = document.createElement("div");
    banner.className = "first-seen-banner";
    banner.textContent = "📖 NEW — Study the correct answer, then press Next";
    choicesEl.before(banner);
  }

  const letters = "ABCDE";
  shuffled.forEach((choice, i) => {
    const btn = document.createElement("button");
    btn.className = "choice-btn";
    const choiceText = choice.replace(/^[a-e]\.\s*/, "");
    btn.innerHTML = `<span class="letter">${letters[i]}</span><span>${choiceText}</span>`;
    btn.dataset.choiceText = choiceText;

    if (isFirstSeen) {
      // Highlight the correct answer, disable all buttons
      btn.classList.add("disabled");
      if (normalize(choiceText) === normalize(currentQ.answer)) {
        btn.classList.add("first-seen-answer");
      }
    } else {
      btn.onclick = () => selectAnswer(btn, choiceText);
    }
    choicesEl.appendChild(btn);
  });

  if (isFirstSeen) {
    // Mark as seen but don't affect weight or stats
    state.seen[key] = (state.seen[key] || 0) + 1;
    saveState();
    answered = true;
    document.getElementById("next-btn").classList.add("visible");
  } else {
    document.getElementById("next-btn").classList.remove("visible");
  }

  const card = document.getElementById("question-card");
  card.style.animation = "none";
  card.offsetHeight;
  card.style.animation = "fadeUp .35s ease";
}

function selectAnswer(btn, choiceText) {
  if (answered) return;
  answered = true;

  const key = currentQ._srcChapter + ":" + currentQ.id;
  const correctText = currentQ.answer;

  const normalize = s => s.replace(/^[a-e]\.\s*/, "").trim().toLowerCase().replace(/[.\s]+$/, "");
  const isCorrect = normalize(choiceText) === normalize(correctText);

  updateWeight(key, isCorrect);
  sessionTotal++;
  batchTotal++;
  if (isCorrect) { sessionCorrect++; batchCorrect++; }
  updateStreakBadge();

  const buttons = document.querySelectorAll(".choice-btn");
  buttons.forEach(b => {
    b.classList.add("disabled");
    const bText = b.dataset.choiceText;
    if (normalize(bText) === normalize(correctText)) {
      if (b === btn) b.classList.add("correct");
      else b.classList.add("reveal-correct");
    }
  });

  if (!isCorrect) btn.classList.add("wrong");
  document.getElementById("next-btn").classList.add("visible");
}

function nextQuestion() {
  if (!answered) return;
  if (batchTotal >= 10) { showBatchSummary(); return; }
  showQuestion();
}

function showBatchSummary() {
  document.getElementById("question-area").style.display = "none";
  const summary = document.getElementById("session-summary");
  summary.style.display = "block";
  summary.style.animation = "none";
  summary.offsetHeight;
  summary.style.animation = "fadeUp .4s ease";

  const pct = batchTotal ? Math.round(batchCorrect / batchTotal * 100) : 0;
  document.getElementById("batch-stat").textContent = pct + "% Accuracy";
  document.getElementById("batch-detail").textContent =
    `${batchCorrect}/${batchTotal} correct in this batch · ${sessionCorrect}/${sessionTotal} overall this session`;
}

function closeSummary() {
  batchCorrect = 0;
  batchTotal = 0;
  showQuestion();
}

function updateStreakBadge() {
  document.getElementById("streak-badge").textContent = "🔥 " + state.streak;
}

function goHome() {
  document.getElementById("quiz-screen").style.display = "none";
  document.getElementById("home-screen").style.display = "block";
  renderHome();
}

// ══════════════════════════════════════════════════════════════════════
// STATS
// ══════════════════════════════════════════════════════════════════════
function openStats() {
  const panel = document.getElementById("stats-panel");
  const overallPct = state.totalAnswered
    ? Math.round(state.totalCorrect / state.totalAnswered * 100) : 0;

  let html = `
    <h2>Statistics <button class="close-btn" onclick="closeStats()">✕</button></h2>
    <div class="stat-row"><span class="stat-label">Total Answered</span><span class="stat-value">${state.totalAnswered}</span></div>
    <div class="stat-row"><span class="stat-label">Overall Accuracy</span><span class="stat-value">${overallPct}%</span></div>
    <div class="stat-row"><span class="stat-label">Current Streak</span><span class="stat-value">🔥 ${state.streak}</span></div>
    <div class="stat-row"><span class="stat-label">Best Streak</span><span class="stat-value">⭐ ${state.bestStreak}</span></div>
  `;

  function addSection(title, cssClass, keys) {
    html += `<div class="stats-section-header ${cssClass}">${title}</div>`;
    keys.forEach(key => {
      const qs = QUIZ_DATA[key];
      let chSeen = 0, chCorrect = 0, chMastered = 0;
      qs.forEach(q => {
        const k = key + ":" + q.id;
        chSeen += state.seen[k] || 0;
        chCorrect += state.correct[k] || 0;
        if (getWeight(k) < 0.6) chMastered++;
      });
      const chPct = chSeen ? Math.round(chCorrect / chSeen * 100) : 0;
      html += `
        <div class="chapter-stat">
          <h4>${CHAPTER_NAMES[key]}</h4>
          <div class="stat-row"><span class="stat-label">Accuracy</span><span class="stat-value">${chPct}%</span></div>
          <div class="stat-row"><span class="stat-label">Mastered</span><span class="stat-value" style="color:var(--correct)">${chMastered}/${qs.length}</span></div>
          <div class="stat-row"><span class="stat-label">Times Studied</span><span class="stat-value">${chSeen}</span></div>
        </div>
      `;
    });
  }

  addSection("Midterm (1–5)", "midterm", MIDTERM_KEYS);
  addSection("Final (6–12)", "final", FINAL_KEYS);

  html += `<button class="reset-btn" onclick="resetAll()">🗑 Reset All Progress</button>`;
  panel.innerHTML = html;
  document.getElementById("stats-overlay").classList.add("open");
}
function closeStats() { document.getElementById("stats-overlay").classList.remove("open"); }
function resetAll() {
  if (confirm("Reset ALL progress? This cannot be undone.")) {
    state = freshState();
    saveState();
    closeStats();
    renderHome();
  }
}

// ══════════════════════════════════════════════════════════════════════
// KEYBOARD SHORTCUTS
// ══════════════════════════════════════════════════════════════════════
document.addEventListener("keydown", e => {
  if (document.getElementById("quiz-screen").style.display !== "block") return;
  if (document.getElementById("session-summary").style.display === "block") {
    if (e.key === "Enter" || e.key === " ") { e.preventDefault(); closeSummary(); }
    return;
  }

  const keyMap = { "1": 0, "2": 1, "3": 2, "4": 3, "5": 4,
                   "a": 0, "b": 1, "c": 2, "d": 3, "e": 4 };
  const idx = keyMap[e.key.toLowerCase()];

  if (idx !== undefined && !answered) {
    const btns = document.querySelectorAll(".choice-btn");
    if (btns[idx]) btns[idx].click();
  }

  if ((e.key === "Enter" || e.key === " ") && answered) {
    e.preventDefault();
    nextQuestion();
  }
});

document.getElementById("stats-overlay").addEventListener("click", e => {
  if (e.target === e.currentTarget) closeStats();
});

// ══════════════════════════════════════════════════════════════════════
// INIT
// ══════════════════════════════════════════════════════════════════════
renderHome();
</script>
</body>
</html>
